<!DOC<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImoYoizo!</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: #f5f5f5;
}

h1 { font-size: 50px; }
p { font-size: 20px; }

.boutons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 15px 20px;
    font-size: 16px;
    cursor: pointer;
}

.argent {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}

.inv {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
}
</style>
</head>

<body>

<!-- 💰 argent -->
<div class="argent">
Argent : <span id="argent">0</span><br>
<button onclick="addMoney()">+100</button>
</div>

<!-- 📦 inventaire -->
<div class="inv">
<h3>Inventaire</h3>
<ul id="inv"></ul>
</div>

<h1>ImoYoizo!</h1>
<p>Achète des trucs inutiles 😄</p>

<div class="boutons">

<button onclick="location.href='page1.html'">Yoizo</button>
<button onclick="location.href='page2.html'">Maison</button>
<button onclick="location.href='page3.html'">💩 Merde</button>
<button onclick="location.href='market.html'">🏪 Marché</button>

</div>

<script>

// argent
let argent = parseInt(localStorage.getItem("argent") || 0);
document.getElementById("argent").textContent = argent;

function addMoney(){
    argent += 100;
    localStorage.setItem("argent", argent);
    document.getElementById("argent").textContent = argent;
}

// inventaire
function showInv(){
    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    let ul = document.getElementById("inv");
    ul.innerHTML = "";

    inv.forEach(i => {
        let li = document.createElement("li");
        li.textContent = i;
        ul.appendChild(li);
    });
}

showInv();

</script>

</body>
</html>
