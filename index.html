<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="theme-color" content="#6a11cb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImoYoizo</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
min-height:100vh;
color:white;
}

.topbar{
display:flex;
justify-content:flex-end;
padding:15px;
}

.argent{
background:white;
color:black;
padding:12px;
border-radius:15px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<script>

    let user = localStorage.getItem("user");

if(!user || user.startsWith("user")){
    localStorage.removeItem("user");
    window.location.href = "auth.html";
}

</script>

<body>

<div class="topbar">
<div class="argent">
💰 <span id="argent">0</span><br><br>
<button onclick="addMoney()">+100</button>
</div>
</div>

<h1>ImoYoizo</h1>

<button onclick="location.href='market.html'">🏪 Marché</button>
<button onclick="location.href='inventaire.html'">📦 Inventaire</button>

<script>

let argent = parseInt(localStorage.getItem("argent") || 0);

document.getElementById("argent").innerText = argent;

function addMoney(){
    argent += 100;
    localStorage.setItem("argent", argent);
    document.getElementById("argent").innerText = argent;
}

</script>

</body>
</html>
