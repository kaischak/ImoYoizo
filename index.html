<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImoYoizo!</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: #f5f5f5;
}

h1 { font-size: 50px; }

p { font-size: 20px; }

.boutons {
    display: flex;
    justify-content: center;
    gap: 20px;
    <button onclick="window.location.href='page3.html'">
    Acheter merde
    </button>
}

button {
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
}

.argent-box {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 18px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}

.inventaire {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 14px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
}
</style>
</head>

<body>

<div class="argent-box">
Argent : <span id="argent">0</span><br>
<button onclick="ajouterArgent()">+100</button>
</div>

<div class="inventaire">
<h3>Inventaire</h3>
<ul id="inv"></ul>
</div>

<h1>ImoYoizo!</h1>

<p>Achetez un Yoizo ou achetez une maison Yoizo</p>

<div class="boutons">
<button onclick="window.location.href='page1.html'">Acheter un Yoizo</button>
<button onclick="window.location.href='page2.html'">Acheter une maison Yoizo</button>
</div>

<script>
// charger argent
let argent = localStorage.getItem("argent") || 0;
argent = parseInt(argent);
document.getElementById("argent").textContent = argent;

function ajouterArgent(){
    argent += 100;
    localStorage.setItem("argent", argent);
    document.getElementById("argent").textContent = argent;
}

// charger inventaire
function afficherInventaire(){
    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    let ul = document.getElementById("inv");
    ul.innerHTML = "";

    inv.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item;
        ul.appendChild(li);
    });
}
afficherInventaire();
</script>

</body>
</html>
