<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ImoYoizo!</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    min-height: 100vh;
    background: #f5f5f5;
    padding-top: 50px;
}

.logo {
    width: 150px;
    margin-bottom: 20px;
}

.argent {
    position: fixed;
    top: 10px;
    right: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.boutons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="argent">
    Argent : <span id="argent">0</span><br><br>
    <button onclick="addMoney()">+100</button>
</div>

<img src="logo.png" alt="Logo ImoYoizo" class="logo">

<h1>ImoYoizo!</h1>

<p>Achetez un Yoizo ou achetez une maison Yoizo</p>

<div class="boutons">

    <button onclick="location.href='page1.html'">
        🐶 Acheter un Yoizo
    </button>

    <button onclick="location.href='page2.html'">
        🏠 Acheter une maison
    </button>

    <button onclick="location.href='page3.html'">
        💩 Acheter merde
    </button>

    <button onclick="location.href='market.html'">
        🏪 Marché
    </button>

    <button onclick="location.href='inventaire.html'">
        📦 Inventaire
    </button>

</div>

<script>

// Charger argent
let argent = parseInt(localStorage.getItem("argent") || 0);

document.getElementById("argent").textContent = argent;

// Ajouter argent
function addMoney() {
    argent += 100;

    localStorage.setItem("argent", argent);

    document.getElementById("argent").textContent = argent;
}

</script>

</body>
</html>
