<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ImoYoizo!</title>

<link rel="icon" href="logo.png">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;

background:linear-gradient(
135deg,
#6a11cb,
#2575fc
);

min-height:100vh;
color:white;
}

.topbar{
display:flex;
justify-content:flex-end;
padding:15px;
}

.argent{
background:white;
color:black;
padding:12px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.logo{
width:180px;
margin-top:30px;
border-radius:25px;
box-shadow:0 0 20px rgba(255,255,255,0.5);
}

.menu{

width:90%;
max-width:900px;

margin:auto;
margin-top:30px;

padding:30px;

background:rgba(255,255,255,0.15);

border-radius:25px;

backdrop-filter:blur(10px);

box-shadow:0 0 20px rgba(0,0,0,0.2);

}

h1{
font-size:60px;
margin-bottom:10px;
}

p{
font-size:22px;
}

.boutons{

display:flex;
flex-wrap:wrap;

justify-content:center;

gap:15px;

margin-top:30px;

}

button{

border:none;

padding:15px 25px;

font-size:18px;

cursor:pointer;

border-radius:15px;

background:white;

color:#2575fc;

transition:0.2s;

font-weight:bold;

}

button:hover{
transform:scale(1.1);
}

.footer{
margin-top:40px;
opacity:0.8;
}

</style>
</head>
<body>

<div class="topbar">

<div class="argent">

💰 Argent :
<span id="argent">0</span>

<br><br>

<button onclick="addMoney()">
+100
</button>

</div>

</div>

<img src="logo.png" class="logo">

<div class="menu">

<h1>ImoYoizo!</h1>

<p>
Achetez un Yoizo ou achetez une maison Yoizo
</p>

<div class="boutons">

<button onclick="location.href='page1.html'">
🐶 Yoizo
</button>

<button onclick="location.href='page2.html'">
🏠 Maison
</button>

<button onclick="location.href='page3.html'">
💩 Merde
</button>

<button onclick="location.href='market.html'">
🏪 Marché
</button>

<button onclick="location.href='inventaire.html'">
📦 Inventaire
</button>

</div>

<div class="footer">

Bienvenue sur ImoYoizo !

</div>

</div>

<script>

let argent =
parseInt(
localStorage.getItem("argent")
|| 0
);

document.getElementById("argent")
.textContent = argent;

function addMoney(){

argent += 100;

localStorage.setItem(
"argent",
argent
);

document.getElementById("argent")
.textContent = argent;

}

</script>

</body>
</html>
