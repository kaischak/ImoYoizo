<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Messages</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0f;
color:white;
}

.header{
padding:15px;
font-size:20px;
font-weight:bold;
}

.chat{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin:10px;
background:#1c1c2a;
border-radius:15px;
cursor:pointer;
}

.chat:hover{
background:#2a2a3a;
}

.badge{
background:#00ccff;
color:black;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">💬 Messages</div>

<div id="list">Chargement...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
"https://eezsocswqhqgkvghhygq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ"
);

let user = localStorage.getItem("user");

async function loadInbox(){

let { data } = await client
.from("messages")
.select("*")
.or(`sender.eq.${user},receiver.eq.${user}`);

let map = {};

(data || []).forEach(m=>{
let other = m.sender === user ? m.receiver : m.sender;
map[other] = true;
});

let html = "";

Object.keys(map).forEach(u=>{
html += `
<div class="chat" onclick="openChat('${u}')">
<div>👤 ${u}</div>
<div class="badge">ouvrir</div>
</div>
`;
});

document.getElementById("list").innerHTML =
html || "Aucun message";

}

function openChat(u){
localStorage.setItem("chatWith", u);
location.href="chat.html";
}

loadInbox();

</script>

</body>
</html>
