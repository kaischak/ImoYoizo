<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inventaire</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0b0b0f;
    color:white;
    text-align:center;
}

h1{
    margin-top:25px;
}

#inventaire{
    max-width:600px;
    margin:20px auto;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:10px;
}

.item{
    background:#16161d;
    padding:15px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{
    color:#00ff99;
    font-weight:bold;
}

.small{
    opacity:0.6;
    font-size:12px;
}

button{
    margin-top:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>📦 Inventaire</h1>

<div id="inventaire"></div>

<button onclick="location.href='index.html'">🏠 Retour</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔥 CONFIG SUPABASE
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "TON_SUPABASE_KEY_ICI";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// 👤 USER SAFE (IMPORTANT)
let user = localStorage.getItem("user");

if(!user){
    user = "user_" + Math.floor(Math.random()*9999999);
    localStorage.setItem("user", user);
}

console.log("USER INVENTAIRE =", user);

const container = document.getElementById("inventaire");

// 🚀 LOAD INVENTAIRE (VERSION ULTRA SAFE)
async function loadInventory(){

    let { data, error } = await client
        .from("inventaire")
        .select("*");

    console.log("ALL DATA =", data);
    console.log("ERROR =", error);

    if(error){
        container.innerHTML = "<p>Erreur Supabase</p>";
        return;
    }

    // 🔥 FILTRE MANUEL (évite tous bugs RLS / type / eq)
    let items = (data || []).filter(i => i.user_id === user);

    console.log("FILTERED =", items);

    container.innerHTML = "";

    if(items.length === 0){
        container.innerHTML = "<p>Aucun objet dans l'inventaire</p>";
        return;
    }

    items.forEach(item => {

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div>
                <b>${item.item}</b>
                <div class="small">ID: ${item.id}</div>
            </div>

            <div class="price">
                💰 ${item.price}
            </div>
        `;

        container.appendChild(div);
    });
}

loadInventory();

</script>

</body>
</html>
