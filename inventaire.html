<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inventaire</title>

<style>
body{
    font-family: Arial;
    background:#0b0b0f;
    color:white;
    text-align:center;
}

.item{
    background:#16161d;
    margin:10px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>📦 Inventaire Synchro</h1>

<div id="list"></div>

<button onclick="location.href='index.html'">🏠 retour</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "TON_KEY";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = localStorage.getItem("user");

async function load(){

    let { data } = await client
        .from("inventaire")
        .select("*")
        .eq("user_id", user);

    let div = document.getElementById("list");
    div.innerHTML = "";

    if(!data || data.length === 0){
        div.innerHTML = "<p>Inventaire vide</p>";
        return;
    }

    data.forEach(item => {

        let el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
            <h3>${item.item}</h3>
            <p>💰 ${item.price}</p>
        `;

        div.appendChild(el);
    });
}

load();

</script>

</body>
</html>
