<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inventaire</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:50px;
}

li{
    margin:10px;
    padding:10px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>📦 Mon Inventaire</h1>

<ul id="inventaire"></ul>

<button onclick="location.href='index.html'">🏠 Retour</button>

<script>
let inv = JSON.parse(localStorage.getItem("inventaire") || "[]");

console.log(inv);

let ul = document.getElementById("inventaire");

if(inv.length === 0){
    ul.innerHTML = "<li>Inventaire vide</li>";
} else {
    inv.forEach(item => {
        let li = document.createElement("li");

        li.innerHTML = `
            <strong>${item.name}</strong><br>
            💰 ${item.price}<br>
            👤 ${item.owner || "system"}
        `;

        ul.appendChild(li);
    });
}
</script>

</body>
</html>
