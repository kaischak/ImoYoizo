<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Yoizo</title>

<style>
body { font-family: Arial; text-align:center; margin-top:50px; }
button { padding:15px; font-size:18px; }
</style>
</head>

<body>

<h1>🐶 Yoizo</h1>

<button onclick="buy()">Acheter 10000💰</button>

<p id="msg"></p>

<script>
function buy(){
    let price = 10000;
    let money = parseInt(localStorage.getItem("argent") || 0);

    if(money < price){
        document.getElementById("msg").textContent = "❌ Pas assez d'argent";
        return;
    }

    money -= price;
    localStorage.setItem("argent", money);

    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    inv.push("Yoizo");
    localStorage.setItem("inventaire", JSON.stringify(inv));

    document.getElementById("msg").textContent =
    "✅ Yoizo acheté ! hôtel Les Connards de Vinci";
}
</script>

</body>
</html>
