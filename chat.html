<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
#header{
padding:15px;
background:#16161d;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

#with{
opacity:0.7;
font-size:14px;
}

/* MESSAGES */
#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:18px;
word-wrap:break-word;
font-size:15px;
}

.me{
background:#00ff99;
color:black;
align-self:flex-end;
border-bottom-right-radius:5px;
}

.other{
background:#1c1c2a;
align-self:flex-start;
border-bottom-left-radius:5px;
}

.recording{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* INPUT */
#inputBar{
display:flex;
padding:10px;
background:#16161d;
gap:10px;
border-top:1px solid rgba(255,255,255,0.05);
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#1c1c2a;
color:white;
outline:none;
}

#sendBtn{
width:50px;
border:none;
border-radius:12px;
background:#00ccff;
color:black;
font-size:18px;
cursor:pointer;
}
  @media (max-width: 600px){

body{
font-size:16px;
}

/* header plus lisible */
#header{
padding:18px;
font-size:18px;
}

/* messages plus larges */
.msg{
max-width:85%;
font-size:16px;
padding:12px 14px;
}

/* zone messages prend plus de place */
#messages{
padding:12px;
}

/* input plus gros */
#input{
font-size:16px;
padding:14px;
}

/* bouton envoyer plus facile à toucher */
#sendBtn{
width:55px;
font-size:20px;
}
}
</style>


</head>

<body>

<div id="header">
💬 Chat
<div id="with">...</div>
</div>

<div id="messages"></div>

<div id="inputBar">
<input id="input" placeholder="Écris un message...">
<button onclick="offerPrice()">
💰 Offre
</button>
<button id="recordBtn">🎤</button>
<button id="sendBtn" onclick="send()">➤</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const client = supabase.createClient(
"https://eezsocswqhqgkvghhygq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ"
);

let user = localStorage.getItem("user");
let friend = localStorage.getItem("chatWith");

if(!user || !friend){
alert("Erreur chat");
location.href="index.html";
}

/* AFFICHER NOM */
document.getElementById("with").innerText = "avec " + friend;

let mediaRecorder;
let chunks = [];

const recordBtn = document.getElementById("recordBtn");

recordBtn.onclick = async () => {

    recordBtn.innerText = "🔴 REC";
    recordBtn.classList.add("recording");

    const stream = await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    mediaRecorder = new MediaRecorder(stream);

    chunks = [];

    mediaRecorder.ondataavailable =
    e => chunks.push(e.data);

    mediaRecorder.onstop = async () => {

        recordBtn.innerText = "🎤";
        recordBtn.classList.remove("recording");

        const blob =
        new Blob(chunks,{type:"audio/webm"});

        const reader = new FileReader();

        reader.onload = async e => {

            await client
            .from("messages")
            .insert([{
                sender:user,
                receiver:friend,
                voice:e.target.result
            }]);

            load();
        };

        reader.readAsDataURL(blob);
    };

    mediaRecorder.start();

    setTimeout(()=>{
        mediaRecorder.stop();
    },10000);
};

async function offerPrice(){

    let price =
    prompt("Ton offre ?");

    if(!price) return;

 await client
.from("messages")
.insert([{
    sender: user,
    receiver: friend,
    offer_price: Number(price),
    offer_status: "pending"
}]);

    load();
}

async function acceptOffer(id){

    await client
    .from("messages")
    .update({
        offer_status: "accepted"
    })
    .eq("id", id);

    alert("✔ Offre acceptée 💰");

    load();
}

async function rejectOffer(id){

    await client
    .from("messages")
    .update({
        offer_status: "rejected"
    })
    .eq("id", id);

    alert("❌ Offre refusée");

    load();
}

/* LOAD MESSAGES */
async function load(){

    // 🔥 1. récupérer les users (AVANT messages)
    let { data: users } = await client
        .from("users")
        .select("username, avatar");

    let { data } = await client
        .from("messages")
        .select("*")
        .or(
        `and(sender.eq.${user},receiver.eq.${friend}),and(sender.eq.${friend},receiver.eq.${user})`
        )
        .order("created_at", { ascending: true });

    let box = document.getElementById("messages");
    box.innerHTML = "";

    (data || []).forEach(m => {

        let div = document.createElement("div");
        div.className = "msg " + (m.sender === user ? "me" : "other");

        // 🔥 fonction avatar
        let u = users.find(x => x.username === m.sender);
        let avatar = u?.avatar || `https://ui-avatars.com/api/?name=${m.sender}`;

    if(m.voice){

    div.innerHTML = `
<div style="display:flex;flex-direction:column;gap:5px;">

    <div style="display:flex;align-items:center;gap:8px;">
        <img src="${avatar}"
        style="width:25px;height:25px;border-radius:50%;">

        <span style="
        font-size:12px;
        opacity:0.7;
        ">
        🎙 Message vocal
        </span>
    </div>

    <audio
    controls
    src="${m.voice}"
    style="
    width:220px;
    height:35px;
    ">
    </audio>

</div>
`;
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:15px;
">

<span style="font-size:20px;">🎤</span>

<audio
controls
src="${m.voice}"
style="
width:220px;
height:35px;
">
</audio>

</div>
    </div>
    `;

} else if(m.offer_price){

    let statusText = "";

    if(m.offer_status === "accepted"){
        statusText = "✔ Acceptée";
    }
    else if(m.offer_status === "rejected"){
        statusText = "❌ Refusée";
    }
    else {
        statusText = "⏳ En attente";
    }

    div.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:5px;">
        <img src="${avatar}"
        style="width:25px;height:25px;border-radius:50%;">

        💰 Offre :
        <b style="font-size:18px;">${m.offer_price} 💰</b>

        <small>${statusText}</small>

        ${m.offer_status === "pending" ? `
        <div style="display:flex;gap:8px;margin-top:5px;">
            <button onclick="acceptOffer('${m.id}')"
            style="background:#00ff99;border:none;padding:6px 10px;border-radius:10px;">
                ✔ Accepter
            </button>

            <button onclick="rejectOffer('${m.id}')"
            style="background:#ff3b3b;border:none;padding:6px 10px;border-radius:10px;color:white;">
                ❌ Refuser
            </button>
        </div>
        ` : ""}

    </div>
    `;

} else {

    div.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
        <img src="${avatar}"
        style="width:25px;height:25px;border-radius:50%;">

        <span>${m.message}</span>
    </div>
    `;

}

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

/* ENVOYER MESSAGE */
async function send(){

let msg = document.getElementById("input").value.trim();

if(!msg) return;

await client.from("messages").insert([{
sender: user,
receiver: friend,
message: msg
}]);

document.getElementById("input").value = "";
load();
}

/* ENTER pour envoyer */
document.getElementById("input").addEventListener("keydown", e=>{
if(e.key === "Enter") send();
});

/* AUTO REFRESH */
setInterval(load, 2000);

load();

</script>
</body>
</html>
