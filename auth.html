<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login ImoYoizo</title>
<style>
body{
font-family:Arial;
background:#0b0b0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
width:220px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🔐 ImoYoizo</h1>

<input id="username" placeholder="pseudo">
<input id="password" type="password" placeholder="mot de passe">

<button id="registerBtn">Créer compte</button>
<button id="loginBtn">Connexion</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const client = supabase.createClient(
"https://eezsocswqhqgkvghhygq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ"
);

async function register(){
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

let { error } = await client
.from("users")
.insert([{ username, password }]);

if(error){
    console.log(error);
    alert(error.message);
    return;
}

alert("Compte créé !");
}

async function login(){
const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

let { data, error } = await client
.from("users")
.select("*")
.eq("username", username)
.eq("password", password)
.single();

if(error || !data){
alert("Identifiants incorrects");
return;
}

localStorage.setItem("user", username);
window.location.href = "index.html";
}
document.getElementById("registerBtn").addEventListener("click", register);
document.getElementById("loginBtn").addEventListener("click", login);
</script>

</body>
</html>
