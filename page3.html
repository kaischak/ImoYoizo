<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Boutique Merde</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
min-height:100vh;
margin:0;
padding-top:50px;
}

.box{
background:rgba(255,255,255,0.15);
width:90%;
max-width:800px;
margin:auto;
padding:30px;
border-radius:25px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:15px;
cursor:pointer;
margin:5px;
}
</style>
</head>
<body>

<div class="box">

<h1>💩 Boutique Merde</h1>

<button onclick="buy('💩 Merde normale',10)">
💩 Normale - 10💰
</button>

<button onclick="buy('☢️ Merde radioactive',100)">
☢️ Radioactive - 100💰
</button>

<button onclick="buy('☠️ Merde empoisonnée',1000)">
☠️ Empoisonnée - 1000💰
</button>

<br><br>

<button onclick="location.href='index.html'">
🏠 Accueil
</button>

<p id="msg"></p>

</div>

<script>

function buy(item,prix){

let argent=parseInt(
localStorage.getItem("argent")||0
);

if(argent<prix){

document.getElementById("msg").textContent=
"❌ Pas assez d'argent";

return;
}

argent-=prix;

localStorage.setItem(
"argent",
argent
);

let inv=
JSON.parse(
localStorage.getItem("inventaire")
)||[];

inv.push(item);

localStorage.setItem(
"inventaire",
JSON.stringify(inv)
);

document.getElementById("msg").textContent=
"✅ Achat effectué !";
}

</script>

</body>
</html>
