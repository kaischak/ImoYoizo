<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Merde Shop</title>

<style>
body { font-family: Arial; text-align:center; margin-top:50px; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h1>💩 Boutique Merde</h1>

<button onclick="buy('Merde normale',10)">Normal (10💰)</button>
<button onclick="buy('Merde radioactive',100)">Radioactive (100💰)</button>
<button onclick="buy('Merde empoisonnée',1000)">Empoisonnée (1000💰)</button>

<p id="msg"></p>

<script>
function buy(name, price){
    let money = parseInt(localStorage.getItem("argent") || 0);

    if(money < price){
        document.getElementById("msg").textContent = "❌ Pas assez d'argent";
        return;
    }

    money -= price;
    localStorage.setItem("argent", money);

    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    inv.push(name);
    localStorage.setItem("inventaire", JSON.stringify(inv));

    document.getElementById("msg").textContent = "✅ Achat : " + name;
}
</script>

</body>
</html>
