<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Amis - ImoYoizo</title>
<style>
body{
font-family:Arial;
background:#0b0b0f;
color:white;
margin:0;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

.friend{
background:#1c1c2a;
padding:10px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>👥 Amis</h1>

<input id="pseudo" placeholder="Pseudo ami">
<button onclick="addFriend()">Ajouter</button>

<h2>📩 Demandes</h2>
<div id="requests"></div>

<h2>🤝 Amis</h2>
<div id="friends"></div>

<div id="friendsList"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://eezsocswqhqgkvghhygq.supabase.co",
"TON_KEY"
);

let user = localStorage.getItem("user");

function addFriend(){

    let input = document.getElementById("pseudo");

    if(!input){
        alert("Input introuvable");
        return;
    }

    let pseudo = input.value.trim();

    if(!pseudo){
        alert("Pseudo vide");
        return;
    }

    console.log("Pseudo recherché :", pseudo);
}
async function loadFriends(){

    // 1. récupérer l'utilisateur connecté
    let user = localStorage.getItem("user");

    if(!user){
        alert("Utilisateur non connecté");
        window.location.href = "auth.html";
        return;
    }

    // 2. nettoyer les espaces (TRÈS IMPORTANT)
    let cleanUser = user.trim();

    // 3. requête Supabase
    let { data, error } = await client
        .from("friends")
        .select("*")
        .or(`user1.eq.${cleanUser},user2.eq.${cleanUser}`);

    // 4. debug (hyper utile)
    console.log("FRIENDS DATA =", data);
    console.log("FRIENDS ERROR =", error);

    // 5. gestion erreur
    if(error){
        alert("Erreur chargement amis");
        return;
    }

    // 6. si aucun ami
    if(!data || data.length === 0){
        document.getElementById("friendsList").innerHTML =
            "<p>Aucun ami pour le moment 😢</p>";
        return;
    }

    // 7. afficher les amis
    let html = "";

    data.forEach(f => {

        // choisir l'autre utilisateur (pas toi)
        let friend =
            f.user1 === cleanUser ? f.user2 : f.user1;

        html += `
            <div style="
                background:#222;
                padding:10px;
                margin:10px 0;
                border-radius:10px;
            ">
                👤 ${friend}
                <button onclick="openChat('${friend}')">
                    💬 Chat
                </button>
            </div>
        `;
    });

    document.getElementById("friendsList").innerHTML = html;
}

async function accept(id){
await client.from("friends")
.update({status:"accepted"})
.eq("id", id);

loadFriends();
}

function openChat(friend){
localStorage.setItem("chatWith", friend);
window.location.href = "chat.html";
}

loadFriends();
</script>

</body>
</html>
