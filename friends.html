<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
    text-align:center;
}

.container{
    padding:20px;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    width:200px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.card{
    background:#1a1a22;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>👥 Amis</h1>

<div class="container">

<!-- AJOUT AMI -->
<h3>➕ Ajouter un ami</h3>
<input id="pseudo" placeholder="pseudo">
<button onclick="addFriend()">Envoyer demande</button>

<hr>

<!-- DEMANDES -->
<h3>📩 Demandes reçues</h3>
<div id="requests"></div>

<hr>

<!-- AMIS -->
<h3>👬 Mes amis</h3>
<div id="friends"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://eezsocswqhqgkvghhygq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ"
);

let user = localStorage.getItem("user");

if(!user){
    alert("Connecte-toi d'abord !");
    window.location.href = "login.html";
}

/* ------------------ ENVOYER DEMANDE ------------------ */
async function addFriend(){

    let pseudo = document.getElementById("pseudo").value.trim();

    if(!pseudo){
        alert("Entre un pseudo !");
        return;
    }

    if(pseudo === user){
        alert("Impossible de t'ajouter toi-même !");
        return;
    }

    let { error } = await client
    .from("friends")
    .insert([{
        user1: user,
        user2: pseudo,
        status: "pending"
    }]);

    if(error){
        console.log(error);
        alert("Erreur envoi demande");
        return;
    }

    alert("Demande envoyée !");
}

/* ------------------ DEMANDES RECUES ------------------ */
async function loadRequests(){

    let { data, error } = await client
    .from("friends")
    .select("*")
    .eq("user2", user)
    .eq("status", "pending");

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(r => {
        html += `
        <div class="card">
            👤 ${r.user1}<br>
            <button onclick="acceptFriend(${r.id})">✔ Accepter</button>
            <button onclick="rejectFriend(${r.id})">❌ Refuser</button>
        </div>
        `;
    });

    document.getElementById("requests").innerHTML = html || "Aucune demande";
}

/* ------------------ ACCEPTER ------------------ */
async function acceptFriend(id){

    let { error } = await client
    .from("friends")
    .update({ status: "accepted" })
    .eq("id", id);

    if(error){
        console.log(error);
        return;
    }

    loadRequests();
    loadFriends();
}

/* ------------------ REFUSER ------------------ */
async function rejectFriend(id){

    let { error } = await client
    .from("friends")
    .delete()
    .eq("id", id);

    if(error){
        console.log(error);
        return;
    }

    loadRequests();
}

/* ------------------ AMIS ------------------ */
async function loadFriends(){

    let { data, error } = await client
    .from("friends")
    .select("*")
    .eq("status", "accepted")
    .or(`user1.eq.${user},user2.eq.${user}`);

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(f => {

        let friend = (f.user1 === user) ? f.user2 : f.user1;

        html += `
        <div class="card">
            👤 ${friend}
        </div>
        `;
    });

    document.getElementById("friends").innerHTML = html || "Aucun ami";
}

/* ------------------ INIT ------------------ */
loadRequests();
loadFriends();

</script>

</body>
</html>
