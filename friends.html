<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Amis - ImoYoizo</title>
<style>
body{
font-family:Arial;
background:#0b0b0f;
color:white;
margin:0;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

.friend{
background:#1c1c2a;
padding:10px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>👥 Amis</h1>

<input id="addUser" placeholder="pseudo ami">
<button onclick="addFriend()">Ajouter</button>

<h2>📩 Demandes</h2>
<div id="requests"></div>

<h2>🤝 Amis</h2>
<div id="friends"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
"https://eezsocswqhqgkvghhygq.supabase.co",
"TON_KEY"
);

let user = localStorage.getItem("user");

async function addFriend(){

    let pseudo = document.getElementById("pseudo").value.trim();

    let { data, error } = await client
    .from("users")
    .select("*")
    .eq("username", pseudo)
    .single();

    console.log("DATA =", data);
    console.log("ERROR =", error);

    if(error){
        alert("Erreur : utilisateur introuvable");
        return;
    }

    alert("Utilisateur trouvé : " + data.username);
}
async function loadFriends(){

let { data } = await client
.from("friends")
.select("*")
.or(`user1.eq.${user},user2.eq.${user}`);

let req = document.getElementById("requests");
let fr = document.getElementById("friends");

req.innerHTML = "";
fr.innerHTML = "";

(data || []).forEach(f=>{

if(f.status === "pending" && f.user2 === user){
req.innerHTML += `
<div class="friend">
${f.user1}
<button onclick="accept('${f.id}')">✔ accepter</button>
</div>`;
}

if(f.status === "accepted"){
let friendName = (f.user1 === user) ? f.user2 : f.user1;

fr.innerHTML += `
<div class="friend" onclick="openChat('${friendName}')">
💬 ${friendName}
</div>`;
}

});

}

async function accept(id){
await client.from("friends")
.update({status:"accepted"})
.eq("id", id);

loadFriends();
}

function openChat(friend){
localStorage.setItem("chatWith", friend);
window.location.href = "chat.html";
}

loadFriends();
</script>

</body>
</html>
