<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marché Supabase</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 5px;
}

.card {
    border: 1px solid #ccc;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
}

.card img {
    max-width: 200px;
}
</style>
</head>

<body>

<h1>🏪 Marché en ligne</h1>

<input id="name" placeholder="Nom"><br>
<textarea id="desc" placeholder="Description"></textarea><br>
<input id="price" type="number" placeholder="Prix"><br>
<input id="image" type="file"><br><br>

<button onclick="sell()">Vendre</button>

<hr>

<div id="list">Chargement...</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const supabaseUrl = "https://wuxhvpiaenmhipjfrojj.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1eGh2cGlhZW5taGlwamZyb2pqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDc1MjQ5MywiZXhwIjoyMDk2MzI4NDkzfQ.ssRZDspgNOgHV2__0rZrf37DfiFJS_G6GVKclGpDCq4";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    /* ================= LOAD ================= */
    async function loadProducts(){

        const { data, error } = await supabase
            .from("market")
            .select("*")
            .order("created_at", { ascending: false });

        if(error){
            console.log(error);
            return;
        }

        render(data);
    }

    /* ================= RENDER ================= */
    function render(items){

        const list = document.getElementById("list");
        list.innerHTML = "";

        if(!items || items.length === 0){
            list.innerHTML = "<p>Aucun produit pour le moment</p>";
            return;
        }

        items.forEach(item => {

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <h3>${item.name}</h3>
                <img src="${item.image}">
                <p>${item.description}</p>
                <p>💰 ${item.price}</p>
            `;

            list.appendChild(div);
        });
    }

    /* ================= SELL ================= */
    window.sell = function(){

        const name = document.getElementById("name").value;
        const desc = document.getElementById("desc").value;
        const price = parseInt(document.getElementById("price").value);
        const imageFile = document.getElementById("image").files[0];

        if(!name || !price || !imageFile){
            alert("Remplis tous les champs !");
            return;
        }

        const reader = new FileReader();

        reader.onload = async function(e){

            const { error } = await supabase
                .from("market")
                .insert([{
                    name,
                    description: desc,
                    price,
                    image: e.target.result
                }]);

            if(error){
                console.log(error);
                return;
            }

            document.getElementById("name").value = "";
            document.getElementById("desc").value = "";
            document.getElementById("price").value = "";
            document.getElementById("image").value = "";

            loadProducts();
        };

        reader.readAsDataURL(imageFile);
    };

    /* ================= INIT ================= */
    loadProducts();

});
</script>

</body>
</html>
