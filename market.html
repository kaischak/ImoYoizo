<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Yoizo Feed</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    overflow: hidden;
}

#search {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

#feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.post {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    scroll-snap-align: start;
    border-bottom: 1px solid #333;
    padding: 20px;
}

img {
    max-width: 80%;
    border-radius: 15px;
}

button {
    margin: 5px;
    padding: 10px;
}
</style>
</head>

<body>

<input id="search" placeholder="🔎 rechercher..." oninput="render()">

<div id="feed"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "TON_URL";
const supabaseKey = "TA_KEY";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];

/* 📦 LOAD POSTS */
async function loadPosts(){
    let { data } = await client
        .from("posts")
        .select("*");

    posts = data || [];
    render();
}

/* ❤️ LIKE */
async function like(id, likes){

    await client
        .from("posts")
        .update({ likes: (likes || 0) + 1 })
        .eq("id", id);

    loadPosts();
}

/* 💬 COMMENTAIRE */
async function comment(post_id){

    let text = prompt("Ton commentaire :");

    if(!text) return;

    await client
        .from("comments")
        .insert([{ post_id, text }]);

    alert("Commentaire ajouté 👍");
}

/* 🖥️ RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    let filtered = posts.filter(p =>
        p.name.toLowerCase().includes(search) ||
        p.desc.toLowerCase().includes(search)
    );

    filtered.forEach(post => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>${post.desc}</p>
            <p>💰 ${post.price}</p>

            <p>❤️ ${post.likes || 0}</p>

            <button onclick="like(${post.id}, ${post.likes || 0})">Like</button>
            <button onclick="comment(${post.id})">Commenter</button>
        `;

        feed.appendChild(div);
    });
}

loadPosts();
</script>

</body>
</html>
