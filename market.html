<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Yoizo Feed</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    overflow: hidden;
}

/* 🔎 search */
#search {
    width: 70%;
    padding: 10px;
    margin: 10px;
}

/* ➕ bouton vendre */
#openSell {
    position: fixed;
    right: 20px;
    bottom: 20px;
    padding: 15px 20px;
    border-radius: 50%;
    font-size: 22px;
    background: #00ff99;
    border: none;
    cursor: pointer;
}

/* 📱 feed */
#feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.post {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    scroll-snap-align: start;
    border-bottom: 1px solid #222;
    padding: 20px;
}

img {
    max-width: 80%;
    border-radius: 15px;
}

button {
    margin: 5px;
    padding: 10px;
}

/* 🟦 popup vendre */
#sellBox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#sellBox input, #sellBox textarea {
    width: 80%;
    margin: 5px;
    padding: 10px;
}
</style>
</head>

<body>

<!-- 🔎 SEARCH -->
<input id="search" placeholder="🔎 rechercher..." oninput="render()">

<!-- 📱 FEED -->
<div id="feed"></div>

<!-- ➕ bouton vendre -->
<button id="openSell" onclick="openSell()">+</button>

<!-- 🟦 SELL BOX -->
<div id="sellBox">
    <h2>Vendre un item</h2>

    <input id="name" placeholder="Nom">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="price" type="number" placeholder="Prix">
    <input id="image" type="file">

    <button onclick="sell()">Publier</button>
    <button onclick="closeSell()">Fermer</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];

/* 📦 LOAD */
async function loadPosts(){
    let { data } = await client
        .from("posts")
        .select("*");

    posts = data || [];
    render();
}

/* 🖥️ RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    let filtered = posts.filter(p =>
        p.name.toLowerCase().includes(search) ||
        p.desc.toLowerCase().includes(search)
    );

    filtered.forEach(post => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>${post.desc}</p>
            <p>💰 ${post.price}</p>

            <p>❤️ ${post.likes || 0}</p>

            <button onclick="like(${post.id}, ${post.likes || 0})">Like</button>
            <button onclick="comment(${post.id})">Commenter</button>
        `;

        feed.appendChild(div);
    });
}

/* ❤️ LIKE */
async function like(id, likes){

    await client
        .from("posts")
        .update({ likes: (likes || 0) + 1 })
        .eq("id", id);

    loadPosts();
}

/* 💬 COMMENT */
async function comment(id){

    let text = prompt("Commentaire :");

    if(!text) return;

    await client
        .from("comments")
        .insert([{ post_id: id, text }]);

}

/* ➕ OUVRIR SELL */
function openSell(){
    document.getElementById("sellBox").style.display = "flex";
}

/* ❌ FERMER SELL */
function closeSell(){
    document.getElementById("sellBox").style.display = "none";
}

/* 📤 SELL */
async function sell(){

    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = parseInt(document.getElementById("price").value);
    let file = document.getElementById("image").files[0];

    if(!name || !price || !file){
        alert("Remplis tout !");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){

        await client
            .from("posts")
            .insert([{
                name,
                desc,
                price,
                image: e.target.result,
                likes: 0
            }]);

        closeSell();
        loadPosts();
    };

    reader.readAsDataURL(file);
}

loadPosts();
</script>

</body>
</html>
