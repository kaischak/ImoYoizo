<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoizo Feed Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0f;
    color: white;
}

/* 🔎 TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 10;
}

#search {
    width: 60%;
    max-width: 500px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* 📱 FEED */
#feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.post {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}

.card {
    width: 90%;
    max-width: 450px;
    background: #16161d;
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* ❤️💬🛒 ACTIONS */
.actions {
    position: absolute;
    right: 15px;
    bottom: 120px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.actions button {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 18px;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.likeBtn { background: #ff2d55; color: white; }
.commentBtn { background: #2d6bff; color: white; }
.buyBtn { background: #00ff99; color: black; }

/* ➕ VENDRE */
#openSell {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 30px;
    background: #00ff99;
    border: none;
    cursor: pointer;
    z-index: 20;
}

/* 🟦 POPUP SELL */
#sellBox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 50;
}

.sell-content {
    width: 90%;
    max-width: 400px;
    background: #1a1a22;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
}

.sell-content input,
.sell-content textarea {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    #search {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- 🔎 SEARCH -->
<div class="topbar">
    <input id="search" placeholder="🔎 rechercher..." oninput="render()">
</div>

<!-- 📱 FEED -->
<div id="feed"></div>

<!-- ➕ BUTTON -->
<button id="openSell" onclick="openSell()">+</button>

<!-- 🟦 SELL POPUP -->
<div id="sellBox">
    <div class="sell-content">
        <h2>Vendre un item</h2>

        <input id="name" placeholder="Nom">
        <textarea id="desc" placeholder="Description"></textarea>
        <input id="price" type="number" placeholder="Prix">
        <input id="image" type="file">

        <button onclick="sell()">Publier</button>
        <button onclick="closeSell()">Fermer</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];

/* LOAD */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    let filtered = posts.filter(p =>
        p.name.toLowerCase().includes(search) ||
        p.desc.toLowerCase().includes(search)
    );

    filtered.forEach(post => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
        <div class="card">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>${post.desc}</p>
            <p>💰 ${post.price}</p>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="like(${post.id}, ${post.likes || 0})">❤️</button>
            <button class="commentBtn" onclick="comment(${post.id})">💬</button>
            <button class="buyBtn" onclick="buyPost(${post.id})">🛒</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* LIKE */
async function like(id, likes){
    await client.from("posts")
        .update({ likes: (likes || 0) + 1 })
        .eq("id", id);

    loadPosts();
}

/* COMMENT */
async function comment(id){
    let text = prompt("Commentaire :");
    if(!text) return;

    await client.from("comments")
        .insert([{ post_id: id, text }]);
}

/* BUY */
async function buyPost(id){

    let { data } = await client
        .from("posts")
        .select("*")
        .eq("id", id)
        .single();

    let money = parseInt(localStorage.getItem("argent") || 0);

    if(money < data.price){
        alert("Pas assez d'argent !");
        return;
    }

    money -= data.price;
    localStorage.setItem("argent", money);

    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    inv.push(data.name);
    localStorage.setItem("inventaire", JSON.stringify(inv));

    alert("Acheté !");
}

/* SELL UI */
function openSell(){
    document.getElementById("sellBox").style.display = "flex";
}

function closeSell(){
    document.getElementById("sellBox").style.display = "none";
}

/* SELL */
async function sell(){

    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = parseInt(document.getElementById("price").value);
    let file = document.getElementById("image").files[0];

    if(!name || !price || !file){
        alert("Remplis tout !");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){

        await client.from("posts").insert([{
            name,
            desc,
            price,
            image: e.target.result,
            likes: 0
        }]);

        closeSell();
        loadPosts();
    };

    reader.readAsDataURL(file);
}

loadPosts();
</script>

</body>
</html>
