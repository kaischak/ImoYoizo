<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Market ULTIMATE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* TOP */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#miniProfile{
    position:absolute;
    left:10px;
    font-size:12px;
    cursor:pointer;
}

#addBtn{
    width:50px;
    height:50px;
    border-radius:50%;
    border:none;
    background:linear-gradient(45deg,#00ff99,#00ccff);
    font-size:22px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    padding-top:60px;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    border-radius:15px;
}

/* INFO */
.info{
    text-align:left;
    margin-top:10px;
    font-size:14px;
    opacity:0.9;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
    cursor:pointer;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:92%;
    max-width:520px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

/* CREATE POST ULTRA UI */
.createTitle{
    font-size:20px;
    margin-bottom:10px;
}

input,textarea{
    width:100%;
    margin:6px 0;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}

button{
    cursor:pointer;
}

.primaryBtn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00ff99,#00ccff);
    font-weight:bold;
    margin-top:10px;
}

.closeBtn{
    margin-top:8px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#333;
    color:white;
}

.detailImg{
    width:100%;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="topbar">
    <div id="miniProfile" onclick="openProfile()">
        <strong id="pname">👤 loading...</strong><br>
        <span id="pbio"></span>
    </div>

    <input id="search" placeholder="🔎 rechercher..." oninput="render()">

    <button id="addBtn" onclick="openCreatePost()">+</button>

    <button onclick="openNotif()">🔔</button>
</div>

<div id="feed"></div>

<div id="modal" class="modal">
    <div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
let comments = {};

let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* PROFILE */
async function loadProfile(){
    let { data } = await client.from("profiles").select("*").eq("user_id", user);
    let p = data?.[0];

    if(!p){
        await client.from("profiles").insert([{user_id:user,username:user,bio:"nouveau"}]);
        return loadProfile();
    }

    document.getElementById("pname").innerText = "👤 "+p.username;
    document.getElementById("pbio").innerText = p.bio;
}

/* POSTS */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

/* COMMENTS */
async function loadComments(id){
    let { data } = await client.from("comments").select("*").eq("post_id",id);
    comments[id] = data || [];
}

/* RENDER */
function render(){
    let s = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.filter(p =>
        (p.name||"").toLowerCase().includes(s) ||
        (p.desc||"").toLowerCase().includes(s)
    ).forEach(post => {

        let div = document.createElement("div");
        div.className="post";

        div.innerHTML = `
        <div class="card" onclick="openPost(${post.id})">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <div class="info">
                💰 ${post.price}<br>
                ❤️ ${post.likes||0}<br>
                👤 ${post.user}<br>
                ${post.desc||""}
            </div>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="event.stopPropagation();like(${post.id},${post.likes||0})">❤️</button>
            <button class="commentBtn" onclick="event.stopPropagation();openPost(${post.id})">💬</button>
            <button class="buyBtn" onclick="event.stopPropagation();buy(${post.id})">🛒</button>
        </div>
        `;

        feed.appendChild(div);
        loadComments(post.id);
    });
}

/* OPEN POST */
function openPost(id){
    let p = posts.find(x=>x.id===id);

    document.getElementById("box").innerHTML = `
        <h2>${p.name}</h2>
        <img class="detailImg" src="${p.image}">
        <p>💰 ${p.price}</p>
        <p>${p.desc}</p>

        <h3>Commentaires</h3>
        ${(comments[id]||[]).map(c=>`
            <div>💬 ${c.user}: ${c.text}</div>
        `).join("")}

        <input id="c" placeholder="commentaire">
        <button class="primaryBtn" onclick="addComment(${id})">Envoyer</button>
    `;

    document.getElementById("modal").style.display="flex";
}

/* COMMENT */
async function addComment(id){
    let text = document.getElementById("c").value;
    if(!text) return;

    await client.from("comments").insert([{post_id:id,text,user}]);
    loadComments(id);
    openPost(id);
}

/* LIKE */
async function like(id,likes){
    await client.from("posts").update({likes:(likes||0)+1}).eq("id",id);
    loadPosts();
}

/* BUY */
async function buy(id){
    let {data} = await client.from("posts").select("*").eq("id",id).single();

    let money = parseInt(localStorage.getItem("money")||0);

    if(money < data.price){
        alert("Pas assez d'argent");
        return;
    }

    money -= data.price;
    localStorage.setItem("money",money);

    alert("Acheté !");
}

/* CREATE UI ULTRA */
function openCreatePost(){
    document.getElementById("box").innerHTML = `
        <div class="createTitle">🔥 Créer une annonce</div>

        <input id="n" placeholder="Nom du produit">
        <input id="i" placeholder="Image URL">
        <input id="p" placeholder="Prix">
        <textarea id="d" placeholder="Description incroyable..."></textarea>

        <button class="primaryBtn" onclick="create()">Publier</button>
        <button class="closeBtn" onclick="closeModal()">Fermer</button>
    `;

    document.getElementById("modal").style.display="flex";
}

/* CREATE */
async function create(){
    await client.from("posts").insert([{
        name:n.value,
        image:i.value,
        price:parseFloat(p.value),
        desc:d.value,
        user,
        likes:0
    }]);

    closeModal();
    loadPosts();
}

/* NOTIF */
async function openNotif(){
    let {data} = await client.from("notifications").select("*").eq("user",user);

    document.getElementById("box").innerHTML = `
        <h2>Notifications</h2>
        ${(data||[]).map(n=>`<div>${n.text}</div>`).join("")}
    `;

    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

loadPosts();
loadProfile();
</script>

</body>
</html>
