<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Market FIX ULTIME</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* TOP */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#miniProfile{
    position:absolute;
    left:10px;
    font-size:12px;
    cursor:pointer;
}

#addBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#00ff99;
    font-size:20px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    padding-top:60px;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
    cursor:pointer;
}

.card img{
    width:100%;
    border-radius:15px;
}

/* INFO UNDER POST */
.info{
    text-align:left;
    margin-top:10px;
    font-size:14px;
    opacity:0.9;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}

/* FOLLOW */
.followBtn{
    background:#ffcc00;
    border:none;
    padding:6px;
    border-radius:10px;
    margin-top:5px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

.comment{
    background:#222;
    padding:6px;
    margin:5px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="topbar">

    <div id="miniProfile" onclick="openProfile()">
        <strong id="pname">👤 loading...</strong>
        <div id="pbio">...</div>
    </div>

    <input id="search" placeholder="🔎 rechercher..." oninput="render()">

    <button id="addBtn" onclick="openCreatePost()">+</button>

    <button onclick="openNotif()">🔔</button>
</div>

<div id="feed"></div>

<div id="modal" class="modal">
    <div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
let comments = {};

let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* PROFILE */
async function loadProfile(){

    let { data } = await client
        .from("profiles")
        .select("*")
        .eq("user_id", user);

    let profile = data?.[0];

    if(!profile){
        await client.from("profiles").insert([{
            user_id:user,
            username:user,
            bio:"nouveau utilisateur"
        }]);

        return loadProfile();
    }

    document.getElementById("pname").textContent = "👤 " + profile.username;
    document.getElementById("pbio").textContent = profile.bio;
}

/* POSTS */
async function loadPosts(){

    let { data } = await client
        .from("posts")
        .select("*");

    posts = data || [];
    render();
}

/* COMMENTS */
async function loadComments(postId){

    let { data } = await client
        .from("comments")
        .select("*")
        .eq("post_id", postId);

    comments[postId] = data || [];
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts
    .filter(p =>
        (p.name||"").toLowerCase().includes(search) ||
        (p.desc||"").toLowerCase().includes(search)
    )
    .forEach(post => {

        let div = document.createElement("div");
        div.className="post";

        div.innerHTML = `
        <div class="card" onclick="openPost(${post.id})">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            
            <div class="info">
                <div>💰 ${post.price}</div>
                <div>❤️ ${post.likes || 0}</div>
                <div>${post.desc || ""}</div>
            </div>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="event.stopPropagation(); like(${post.id},${post.likes||0})">❤️</button>
            <button class="commentBtn" onclick="event.stopPropagation(); comment(${post.id})">💬</button>
        </div>
        `;

        feed.appendChild(div);

        loadComments(post.id);
    });
}

/* OPEN POST DETAIL */
function openPost(id){

    let post = posts.find(p => p.id === id);

    document.getElementById("box").innerHTML = `
        <h2>${post.name}</h2>
        <img src="${post.image}" style="width:100%;border-radius:10px;">
        <p>💰 ${post.price}</p>
        <p>${post.desc}</p>

        <h3>Commentaires</h3>
        ${(comments[id]||[]).map(c=>`
            <div class="comment">💬 ${c.user}: ${c.text}</div>
        `).join("")}

        <input id="cText" placeholder="commentaire">
        <button onclick="addComment(${id})">Envoyer</button>
    `;

    document.getElementById("modal").style.display="flex";
}

/* COMMENT */
async function addComment(id){

    let text = document.getElementById("cText").value;
    if(!text) return;

    await client.from("comments").insert([{
        post_id:id,
        text,
        user
    }]);

    loadComments(id);
    openPost(id);
}

/* LIKE */
async function like(id,likes){

    await client.from("posts")
        .update({likes:(likes||0)+1})
        .eq("id",id);

    loadPosts();
}

/* CREATE POST */
function openCreatePost(){

    document.getElementById("box").innerHTML=`
        <h2>Créer post</h2>
        <input id="name" placeholder="nom">
        <input id="image" placeholder="image url">
        <input id="price" placeholder="prix">
        <textarea id="desc" placeholder="description"></textarea>

        <button onclick="createPost()">Publier</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function createPost(){

    await client.from("posts").insert([{
        name:document.getElementById("name").value,
        image:document.getElementById("image").value,
        price:parseFloat(document.getElementById("price").value),
        desc:document.getElementById("desc").value,
        user,
        likes:0
    }]);

    closeModal();
    loadPosts();
}

/* NOTIF */
async function openNotif(){

    let { data } = await client
        .from("notifications")
        .select("*")
        .eq("user",user);

    document.getElementById("box").innerHTML = `
        <h2>Notifications</h2>
        ${(data||[]).map(n=>`<div>${n.text}</div>`).join("")}
    `;

    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* INIT */
loadPosts();
loadProfile();
</script>

</body>
</html>
