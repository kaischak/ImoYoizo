<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Market FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#miniProfile{
    position:absolute;
    left:10px;
    font-size:12px;
    cursor:pointer;
}

#addBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#00ff99;
    font-size:20px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    padding-top:60px;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}
.followBtn{background:#ffcc00;color:black;padding:8px;border-radius:10px;margin-top:5px;}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="topbar">

    <div id="miniProfile" onclick="openProfile()">
        <strong id="pname">👤 loading...</strong>
        <span id="pbio">...</span>
        <div id="pfollowers">0 followers</div>
    </div>

    <input id="search" placeholder="🔎 rechercher..." oninput="render()">

    <button id="addBtn" onclick="openCreatePost()">➕</button>

    <button onclick="openNotif()">🔔</button>
</div>

<div id="feed"></div>

<div id="modal" class="modal">
    <div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "YOUR_SUPABASE_KEY";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];

let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* PROFILE */
async function loadProfile(){

    let { data } = await client
        .from("profiles")
        .select("*")
        .eq("user_id", user);

    let profile = data?.[0];

    if(!profile){
        await client.from("profiles").insert([{
            user_id: user,
            username: user,
            bio: "nouveau utilisateur"
        }]);

        return loadProfile();
    }

    document.getElementById("pname").textContent = "👤 " + profile.username;
    document.getElementById("pbio").textContent = profile.bio;

    loadFollowers();
}

/* FOLLOWERS */
async function loadFollowers(){

    let { data } = await client
        .from("followers")
        .select("*")
        .eq("following", user);

    document.getElementById("pfollowers").textContent =
        (data?.length || 0) + " followers";
}

/* POSTS */
async function loadPosts(){

    let { data } = await client
        .from("posts")
        .select("*");

    posts = data || [];
    render();
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts
    .filter(p => (p.name||"").toLowerCase().includes(search))
    .forEach(post => {

        let div = document.createElement("div");
        div.className="post";

        div.innerHTML = `
        <div class="card">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>💰 ${post.price}</p>
            <p>👤 ${post.user}</p>

            <button class="followBtn" onclick="follow('${post.user}')">➕ Follow</button>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="like(${post.id},${post.likes||0},'${post.user}')">❤️</button>
            <button class="commentBtn" onclick="comment(${post.id},'${post.user}')">💬</button>
            <button class="buyBtn" onclick="buy(${post.id},'${post.user}')">🛒</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* CREATE POST UI */
function openCreatePost(){

    document.getElementById("box").innerHTML = `
        <h2>Créer un post</h2>

        <input id="name" placeholder="nom">
        <input id="image" placeholder="image url">
        <input id="price" placeholder="prix">

        <button onclick="createPost()">Créer</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function createPost(){

    await client.from("posts").insert([{
        name: document.getElementById("name").value,
        image: document.getElementById("image").value,
        price: parseFloat(document.getElementById("price").value),
        user: user,
        likes: 0
    }]);

    closeModal();
    loadPosts();
}

/* FOLLOW */
async function follow(target){

    await client.from("followers").insert([{
        follower:user,
        following:target
    }]);

    alert("follow ok");
}

/* LIKE */
async function like(id,likes,owner){

    await client.from("posts")
        .update({likes:(likes||0)+1})
        .eq("id",id);

    loadPosts();
}

/* COMMENT */
async function comment(id){

    let text = prompt("commentaire");
    if(!text) return;

    await client.from("comments").insert([{
        post_id:id,
        text,
        user
    }]);
}

/* BUY */
async function buy(id){

    let {data} = await client.from("posts")
        .select("*")
        .eq("id",id)
        .single();

    let money = parseInt(localStorage.getItem("money")||0);

    if(money < data.price){
        alert("pas assez d'argent");
        return;
    }

    money -= data.price;
    localStorage.setItem("money",money);

    alert("acheté !");
}

/* PROFILE */
function openProfile(){

    document.getElementById("box").innerHTML = `
        <h2>Profil</h2>
        <input id="username" placeholder="pseudo">
        <input id="bio" placeholder="bio">
        <button onclick="saveProfile()">save</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function saveProfile(){

    await client.from("profiles").upsert([{
        user_id:user,
        username:document.getElementById("username").value,
        bio:document.getElementById("bio").value
    }]);

    loadProfile();
    closeModal();
}

/* NOTIF */
async function openNotif(){

    let {data} = await client
        .from("notifications")
        .select("*")
        .eq("user",user);

    document.getElementById("box").innerHTML = `
        <h2>Notifications</h2>
        ${(data||[]).map(n=>`<div>${n.text}</div>`).join("")}
    `;

    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

loadPosts();
loadProfile();

</script>

</body>
</html>
