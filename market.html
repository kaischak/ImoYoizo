<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marché</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 5px;
}

.card {
    border: 1px solid #ccc;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
}

.card img {
    max-width: 200px;
    max-height: 200px;
}
</style>
</head>

<body>

<h1>🏪 Marché en ligne</h1>

<h3>Créer une annonce</h3>

<input id="name" placeholder="Nom">
<br>

<textarea id="desc" placeholder="Description"></textarea>
<br>

<input id="price" type="number" placeholder="Prix">
<br>

<input id="image" type="file" accept="image/*">
<br><br>

<button onclick="sell()">Vendre</button>

<hr>

<div id="list"></div>

<script>

function getMarket(){
    return JSON.parse(localStorage.getItem("market")) || [];
}

function saveMarket(m){
    localStorage.setItem("market", JSON.stringify(m));
}

function render(){

    let list = document.getElementById("list");
    list.innerHTML = "";

    getMarket().forEach((item, i) => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <h3>${item.name}</h3>

        <img src="${item.image}">

        <p>${item.desc}</p>

        <p>💰 ${item.price}</p>

        <button onclick="buy(${i})">
            Acheter
        </button>
        `;

        list.appendChild(div);
    });
}

function sell(){

    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = parseInt(document.getElementById("price").value);
    let imageFile = document.getElementById("image").files[0];

    if(!name || !price || !imageFile){
        alert("Remplis tous les champs !");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        let market = getMarket();

        market.push({
            name: name,
            desc: desc,
            price: price,
            image: e.target.result
        });

        saveMarket(market);

        document.getElementById("name").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";

        render();
    };

    reader.readAsDataURL(imageFile);
}

function buy(i){

    let market = getMarket();
    let item = market[i];

    let money = parseInt(localStorage.getItem("argent") || 0);

    if(money < item.price){
        alert("Pas assez d'argent !");
        return;
    }

    money -= item.price;
    localStorage.setItem("argent", money);

    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    inv.push(item.name);
    localStorage.setItem("inventaire", JSON.stringify(inv));

    market.splice(i, 1);
    saveMarket(market);

    render();
}

render();

</script>

</body>
</html>
