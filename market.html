<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market FIXED</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* TOP */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#miniProfile{
    position:absolute;
    left:10px;
    font-size:12px;
    cursor:pointer;
}

#addBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#00ff99;
    font-size:20px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    padding-top:60px;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

/* INFO */
.info{
    text-align:left;
    margin-top:10px;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="topbar">

<div id="miniProfile">
<strong id="pname">loading...</strong>
<div id="pbio"></div>
<div id="money"></div>
</div>

<input id="search" placeholder="recherche..." oninput="render()">

<button id="addBtn" onclick="openSell()">+</button>

<button onclick="openInv()">📦</button>

</div>

<div id="feed"></div>

<div id="modal" class="modal">
<div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* MONEY SAFE */
function getMoney(){
    return Number(localStorage.getItem("argent") || 0);
}

function setMoney(v){
    localStorage.setItem("argent", String(v));
    document.getElementById("money").innerText = "💰 " + v;
}

/* PROFILE SIMPLE */
async function loadProfile(){
    document.getElementById("pname").innerText = "👤 " + user;
    setMoney(getMoney());
}

/* POSTS */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

function render(){

    let s = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts
    .filter(p => (p.name||"").toLowerCase().includes(s))
    .forEach(p => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
        <div class="card">
            <h2>${p.name}</h2>
            <img src="${p.image}">
            
            <div class="info">
                💰 ${p.price}<br>
                ❤️ ${p.likes || 0}<br>
                👤 ${p.user}
            </div>

            <button onclick="buy(${p.id})">🛒 BUY</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* BUY FIX TOTAL */
async function buy(id){

    let { data, error } = await client
        .from("posts")
        .select("*")
        .eq("id", id)
        .single();

    if(error){
        console.log("ERREUR GET POST", error);
        alert("Erreur chargement produit");
        return;
    }

    let money = Number(localStorage.getItem("argent") || 0);
    let price = Number(data.price);

    if(money < price){
        alert("Pas assez d'argent !");
        return;
    }

    // 💾 ESSAI INSERT INVENTAIRE
    const { error: invError } = await client
        .from("inventaire")
        .insert([{
            user_id: user,
            item: data.name,
            price: price
        }]);

    if(invError){
        console.log("ERREUR INVENTAIRE", invError);
        alert("Erreur inventaire (Supabase bloque l'insert)");
        return;
    }

    // 💰 SEULEMENT SI TOUT OK
    money -= price;
    localStorage.setItem("argent", money);

    alert("Acheté !");
}

/* CREATE POST */
function openSell(){

    document.getElementById("box").innerHTML = `
        <h2>Créer annonce</h2>
        <input id="name" placeholder="nom">
        <input id="image" placeholder="image url">
        <input id="price" placeholder="prix">
        <textarea id="desc" placeholder="desc"></textarea>

        <button onclick="create()">Publier</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function create(){

    await client.from("posts").insert([{
        name: name.value,
        image: image.value,
        price: price.value,
        desc: desc.value,
        user
    }]);

    document.getElementById("modal").style.display="none";
    loadPosts();
}

/* INVENTAIRE CLOUD */
async function openInv(){

    let { data } = await client
        .from("inventaire")
        .select("*")
        .eq("user_id", user);

    document.getElementById("box").innerHTML = `
        <h2>Inventaire</h2>
        ${(data||[]).map(i=>`
            <div>
                <img src="${i.image}" width="80"><br>
                ${i.name} - ${i.price}
            </div>
        `).join("")}
    `;

    document.getElementById("modal").style.display="flex";
}

loadPosts();
loadProfile();
</script>

</body>
</html>
