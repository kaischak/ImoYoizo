<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoizo Market Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

/* TOP */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 10px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 10;
}

#search {
    width: 60%;
    max-width: 500px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* FEED */
#feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.post {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.card {
    width: 90%;
    max-width: 450px;
    background: #16161d;
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
}

.card img {
    width: 100%;
    border-radius: 15px;
}

/* ACTIONS */
.actions {
    position: absolute;
    right: 15px;
    bottom: 120px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.actions button {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
}

.likeBtn { background: #ff2d55; color: white; }
.commentBtn { background: #2d6bff; color: white; }
.buyBtn { background: #00ff99; }

/* MODAL DÉTAIL */
#detail {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.detailBox {
    width: 90%;
    max-width: 600px;
    background: #16161d;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.detailBox img {
    width: 100%;
    border-radius: 15px;
}

.closeBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: red;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SEARCH -->
<div class="topbar">
    <input id="search" placeholder="🔎 rechercher..." oninput="render()">
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- DETAIL -->
<div id="detail">
    <button class="closeBtn" onclick="closeDetail()">X</button>
    <div class="detailBox" id="detailBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];

/* LOAD */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    let filtered = posts.filter(p =>
        p.name.toLowerCase().includes(search) ||
        p.desc.toLowerCase().includes(search)
    );

    filtered.forEach(post => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
        <div class="card" onclick="openDetail(${post.id})">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>💰 ${post.price}</p>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="event.stopPropagation(); like(${post.id}, ${post.likes || 0})">❤️</button>
            <button class="commentBtn" onclick="event.stopPropagation(); comment(${post.id})">💬</button>
            <button class="buyBtn" onclick="event.stopPropagation(); buyPost(${post.id})">🛒</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* 🔥 OPEN DETAIL */
function openDetail(id){

    let post = posts.find(p => p.id === id);

    document.getElementById("detailBox").innerHTML = `
        <h2>${post.name}</h2>
        <img src="${post.image}">
        <h3>💰 ${post.price}</h3>
        <p>${post.desc}</p>

        <button onclick="like(${post.id}, ${post.likes || 0})">❤️ Like</button>
        <button onclick="comment(${post.id})">💬 Commenter</button>
        <button onclick="buyPost(${post.id})">🛒 Acheter</button>
    `;

    document.getElementById("detail").style.display = "flex";
}

/* CLOSE DETAIL */
function closeDetail(){
    document.getElementById("detail").style.display = "none";
}

/* LIKE */
async function like(id, likes){
    await client.from("posts")
        .update({ likes: (likes || 0) + 1 })
        .eq("id", id);

    loadPosts();
}

/* COMMENT */
async function comment(id){
    let text = prompt("Commentaire :");
    if(!text) return;

    await client.from("comments")
        .insert([{ post_id: id, text }]);
}

/* BUY */
async function buyPost(id){

    let { data } = await client.from("posts")
        .select("*")
        .eq("id", id)
        .single();

    let money = parseInt(localStorage.getItem("argent") || 0);

    if(money < data.price){
        alert("Pas assez d'argent !");
        return;
    }

    money -= data.price;
    localStorage.setItem("argent", money);

    alert("Acheté !");
}

loadPosts();
</script>

</body>
</html>
