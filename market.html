<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Market PREMIUM</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* TOP */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#miniProfile{
    position:absolute;
    left:10px;
    font-size:12px;
    cursor:pointer;
}

#addBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#00ff99;
    font-size:20px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    padding-top:60px;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

.info{
    text-align:left;
    margin-top:10px;
    font-size:14px;
    opacity:0.9;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}

/* ========================= */
/* 💎 PREMIUM CREATE UI */
/* ========================= */

#createOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.createBox{
    width:92%;
    max-width:520px;
    background:linear-gradient(145deg,#16161d,#0f0f14);
    border-radius:25px;
    padding:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    position:relative;
    animation:pop .25s ease;
}

@keyframes pop{
    from{transform:scale(0.95);opacity:0}
    to{transform:scale(1);opacity:1}
}

.createTitle{
    font-size:20px;
    margin-bottom:10px;
}

input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1e1e26;
    color:white;
    outline:none;
}

.dropzone{
    width:100%;
    height:160px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    overflow:hidden;
    margin:10px 0;
    position:relative;
}

.dropzone img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.createBtn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00ff99,#00c3ff);
    font-weight:bold;
    cursor:pointer;
}

.closeBtn{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<div class="topbar">

    <div id="miniProfile">
        <strong id="pname">👤 loading...</strong>
    </div>

    <input id="search" placeholder="🔎 rechercher..." oninput="render()">

    <button id="addBtn" onclick="openCreatePost()">+</button>
</div>

<div id="feed"></div>

<!-- 💎 CREATE OVERLAY -->
<div id="createOverlay">
    <div class="createBox">
        <div class="closeBtn" onclick="closeCreate()">✖</div>

        <div class="createTitle">✨ Nouvelle annonce</div>

        <input id="c_name" placeholder="Nom du produit">
        <textarea id="c_desc" placeholder="Description"></textarea>
        <input id="c_price" type="number" placeholder="Prix">

        <div class="dropzone" onclick="document.getElementById('c_image').click()">
            <input type="file" id="c_image" hidden onchange="previewImage(event)">
            <span id="dropText">📸 Ajouter une image</span>
            <img id="preview" style="display:none;">
        </div>

        <button class="createBtn" onclick="createPost()">Publier ✨</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* LOAD PROFILE SIMPLE */
document.getElementById("pname").textContent = "👤 " + user;

/* LOAD POSTS */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts
    .filter(p => (p.name||"").toLowerCase().includes(search))
    .forEach(post => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
        <div class="card">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            
            <div class="info">
                <div>💰 ${post.price}</div>
                <div>${post.desc || ""}</div>
            </div>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="like(${post.id},${post.likes||0})">❤️</button>
            <button class="commentBtn" onclick="alert('commentaires bientôt')">💬</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* LIKE */
async function like(id,likes){
    await client.from("posts")
        .update({likes:(likes||0)+1})
        .eq("id",id);

    loadPosts();
}

/* OPEN CREATE */
function openCreatePost(){
    document.getElementById("createOverlay").style.display="flex";
}

function closeCreate(){
    document.getElementById("createOverlay").style.display="none";
}

/* IMAGE PREVIEW */
function previewImage(event){
    let file = event.target.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = function(e){
        document.getElementById("preview").src = e.target.result;
        document.getElementById("preview").style.display = "block";
        document.getElementById("dropText").style.display = "none";
    };
    reader.readAsDataURL(file);
}

/* CREATE POST */
async function createPost(){

    let name = document.getElementById("c_name").value;
    let desc = document.getElementById("c_desc").value;
    let price = parseFloat(document.getElementById("c_price").value);
    let file = document.getElementById("c_image").files[0];

    if(!name || !price || !file){
        alert("Remplis tout !");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){

        await client.from("posts").insert([{
            name,
            desc,
            price,
            image:e.target.result,
            user,
            likes:0
        }]);

        closeCreate();
        loadPosts();

        document.getElementById("c_name").value="";
        document.getElementById("c_desc").value="";
        document.getElementById("c_price").value="";
        document.getElementById("preview").style.display="none";
        document.getElementById("dropText").style.display="block";
    };

    reader.readAsDataURL(file);
}

loadPosts();
</script>

</body>
</html>
