<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market FIXED</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;

    display:grid;
    grid-template-columns: 1fr 2fr 1fr;
    align-items:center;

    padding:0 10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
    box-sizing:border-box;
    gap:10px;
}

/* LEFT */
#miniProfile{
    display:flex;
    flex-direction:column;
    justify-content:center;
    font-size:12px;
    overflow:hidden;
}

/* CENTER */
#search{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
    box-sizing:border-box;
}

/* RIGHT */
.topbar-right{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}
#addBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#00ff99;
    font-size:20px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:auto;
    padding-top:60px;
}
.post{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    position:relative;
    padding:20px 0;
}
.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

/* INFO */
.info{
    text-align:left;
    margin-top:10px;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:flex-start;
    overflow-y:auto;
    padding:20px 0;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
    max-height:90vh;
    overflow-y:auto;
    box-sizing:border-box;
}

.chat-btn{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:16px;
cursor:pointer;

font-size:15px;
font-weight:bold;
color:white;

background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.12);

backdrop-filter: blur(10px);

transition: 0.2s ease;
}

.chat-btn:hover{
background: rgba(0, 255, 153, 0.15);
border: 1px solid rgba(0, 255, 153, 0.4);
transform: translateY(-2px);
}

.chat-btn:active{
transform: scale(0.98);
}
    
input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>



<body>



<div class="topbar">

    <!-- LEFT -->
    <div id="miniProfile">
        <strong id="pname">loading...</strong>
        <div id="money"></div>
    </div>

    <!-- CENTER -->
    <input id="search" placeholder="recherche..." oninput="render()">

    <!-- RIGHT -->
    <div class="topbar-right">

        <button id="addBtn" onclick="openSell()">+</button>

        <button onclick="openInv()">📦</button>

        <button onclick="location.href='friends.html'">👥</button>

        <button onclick="location.href='profile.html'">👤</button>

    </div>

</div>

<div id="feed"></div>

<div id="modal" class="modal">
<div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
        let user = localStorage.getItem("user");

if(!user || user.startsWith("user")){
    localStorage.removeItem("user");
    window.location.href = "auth.html";
}
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
localStorage.setItem("user", user);

/* MONEY SAFE */
function getMoney(){
    return Number(localStorage.getItem("argent") || 0);
}

function setMoney(v){
    document.getElementById("money").innerText = "💰 " + v;
}

/* PROFILE SIMPLE */
async function loadProfile(){
    document.getElementById("pname").innerText = "👤 " + user;
    setMoney(getMoney());
}

async function loadAvatar(post){

    let { data } = await client
        .from("users")
        .select("avatar")
        .eq("username", post.user_id)
        .maybeSingle();

    let img = data?.avatar || "";

    let el = document.getElementById(`avatar-${post.id}`);

    if(el){
        el.innerHTML = img
            ? `<img src="${img}" style="width:28px;height:28px;border-radius:50%;">`
            : "";
    }
}
/* POSTS */
async function loadPosts(){
    let { data, error } = await client.from("posts").select("*");

    console.log(data, error); // 👈 AJOUTE ÇA

    posts = data || [];
    render();
    console.log(posts);
}

async function deletePost(id){

    if(!confirm("Supprimer cette annonce ?")){
        return;
    }

    let { error } = await client
    .from("posts")
    .delete()
    .eq("id", id);

    if(error){
        console.log(error);
        alert("Erreur suppression");
        return;
    }

    alert("Annonce supprimée !");
    loadPosts();
}

function openChat(username){

    let user = localStorage.getItem("user");

    if(!user){
        alert("Tu dois être connecté");
        return;
    }

    if(username === user){
        alert("Tu ne peux pas chatter avec toi-même 😅");
        return;
    }

    localStorage.setItem("chatWith", username);
    window.location.href = "chat.html";
}

async function render(){

    let s = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts
    .filter(p => (p.name || "").toLowerCase().includes(s))
    .forEach(p => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
<div class="card"
onclick="openPost(${p.id})"
style="cursor:pointer; position:relative;"
>

    <h2>${p.name}</h2>

    <img src="${p.image}">

    <br>

    <!-- 💥 AVATAR DYNAMIQUE -->
    <span id="avatar-${p.id}"></span>

    <div class="info">
        💰 ${p.price}<br>
        ❤️ ${p.likes || 0}<br>

        <span
        onclick="event.stopPropagation(); openUserMenu('${p.user_id}')"
        style="
        color:#00ccff;
        cursor:pointer;
        ">
        👤 ${p.user_id}
        </span>
    </div>

    <!-- 🛒 BUY -->
    <button onclick="event.stopPropagation(); buy(${p.id})">
        🛒 BUY
    </button>

    <!-- 💬 CHAT -->
    <button
    onclick="event.stopPropagation(); openChat('${p.user_id}')"
    style="
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:15px;
    background:#00ccff;
    color:black;
    cursor:pointer;
    width:100%;
    font-weight:bold;
    ">
    💬 Chat
    </button>

    ${
    p.user_id === user
    ? `
    <button
    onclick="event.stopPropagation(); deletePost(${p.id})"
    style="
    background:red;
    color:white;
    margin-top:10px;
    width:100%;
    border:none;
    border-radius:15px;
    padding:10px;
    ">
    🗑 Supprimer
    </button>
    `
    : ""
    }

</div>
`;

        feed.appendChild(div);

        // 🔥 charger avatar depuis users (IMPORTANT pour anciens posts)
        loadAvatar(p);

    });
}

    function openPost(id){

let p = posts.find(x=>x.id===id);

document.getElementById("box").innerHTML = `

<h1>${p.name}</h1>

<img
src="${p.image}"
style="
width:100%;
border-radius:20px;
">

<br><br>

📝 ${p.desc}

<br><br>

💰 ${p.price}

<br><br>

❤️ ${p.likes}

<br><br>

👤 ${p.user}

`;

document.getElementById("modal").style.display="flex";

}

    function openUserMenu(username){

document.getElementById("box").innerHTML = `

<h2>${username}</h2>

<button
onclick="subscribe('${username}')"
style="
width:100%;
padding:15px;
margin-top:10px;
"
>
⭐ S'abonner
</button>

<button
onclick="openProfile('${username}')"
style="
width:100%;
padding:15px;
margin-top:10px;
"
>
👤 Voir le profil
</button>

<button
onclick="location.href='dm.html?user=${username}'"
style="
width:100%;
padding:15px;
margin-top:10px;
"
>
💬 DM
</button>

`;

document.getElementById("modal").style.display="flex";

}

    function openVideos(id){

let post = posts.find(p=>p.id===id);

document.getElementById("box").innerHTML = `

<h1>🎥 Vidéos</h1>

${
(post.videos || []).map((v,i)=>`

<div
onclick="playVideo('${v}')"
style="
background:#222;
padding:15px;
margin:10px 0;
border-radius:20px;
cursor:pointer;
font-size:20px;
"
>

▶️ Vidéo ${i+1}

</div>

`).join("")
}

<button
onclick="document.getElementById('modal').style.display='none'"
style="
width:100%;
padding:15px;
border:none;
border-radius:20px;
background:#333;
color:white;
cursor:pointer;
"
>

Fermer

</button>

`;

document.getElementById("modal").style.display = "flex";

}

    function playVideo(video){

document.getElementById("box").innerHTML = `

<h1>🎥 Lecture vidéo</h1>

<video
src="${video}"
controls
autoplay
style="
width:100%;
border-radius:20px;
max-height:80vh;
background:black;
">
</video>

<button
onclick="document.getElementById('modal').style.display='none'"
style="
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:20px;
background:#333;
color:white;
cursor:pointer;
"
>

Fermer

</button>

`;

}
    
async function buy(id){

    let { data, error } = await client
        .from("posts")
        .select("*")
        .eq("id", id)
        .single();

    if(error){
        alert("Erreur chargement produit");
        return;
    }

    let money = Number(localStorage.getItem("argent") || 0);
    let price = Number(data.price);

    if(money < price){
        alert("Pas assez d'argent !");
        return;
    }

    const { error: invError } = await client
        .from("inventaire")
        .insert([{
            user_id: user,
            item: data.name,
            image: data.image,
            price: data.price
        }]);

    if(invError){
        console.log(invError);
        alert("Erreur inventaire");
        return;
    }

    money -= price;

    localStorage.setItem("argent", money);

    setMoney(money);

    alert("Acheté !");
}

/* CREATE POST */
function openSell(){

document.getElementById("box").innerHTML = `
<div style="
text-align:center;
">

<h1 style="
margin-top:0;
font-size:32px;
">
🚀 Nouvelle Annonce
</h1>

<p style="
opacity:.8;
margin-bottom:20px;
">
Publie ton objet sur le marché
</p>

<div style="
background:#20202b;
padding:15px;
border-radius:20px;
margin-bottom:15px;
">

<input
id="name"
placeholder="📦 Nom de l'objet"
style="
font-size:18px;
padding:15px;
box-sizing:border-box;
">

</div>

<div style="
background:#20202b;
padding:15px;
border-radius:20px;
margin-bottom:15px;
">

<textarea
id="desc"
placeholder="📝 Description détaillée..."
style="
height:120px;
resize:none;
font-size:16px;
box-sizing:border-box;
"></textarea>

</div>

<div style="
background:#20202b;
padding:15px;
border-radius:20px;
margin-bottom:15px;
">

<input
id="price"
type="number"
placeholder="💰 Prix"
style="
font-size:18px;
padding:15px;
box-sizing:border-box;
">

</div>

<div
id="dropZone"
style="
border:3px dashed #00ff99;
border-radius:20px;
padding:30px;
cursor:pointer;
margin-bottom:15px;
background:rgba(0,255,153,.08);
transition:.2s;
">

<div style="font-size:50px;">
🖼️
</div>

<b>
Glisse une image ici
</b>

<br><br>

ou clique pour choisir un fichier

<input
id="fileInput"
type="file"
accept="image/*"
style="display:none;"
>

</div>

<img
id="preview"
style="
display:none;
width:100%;
border-radius:20px;
margin-bottom:15px;
max-height:300px;
object-fit:cover;
">

<div
id="videoZone"
style="
border:3px dashed #00ccff;
border-radius:20px;
padding:30px;
cursor:pointer;
margin-bottom:15px;
background:rgba(0,170,255,.08);
transition:.2s;
">

<div style="font-size:50px;">
🎥
</div>

<b>
Glisse jusqu'à 3 vidéos ici
</b>

<br><br>

ou clique pour choisir des fichiers

<input
id="videoInput"
type="file"
accept="video/*"
multiple
style="display:none;"
>

</div>

<div id="videoPreview"></div>

<div
style="
position:sticky;
bottom:0;
background:#16161d;
padding-top:15px;
padding-bottom:10px;
"
>

<button
onclick="create()"
style="
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:20px;
font-weight:bold;
background:linear-gradient(45deg,#00ff99,#00ccff);
cursor:pointer;
color:black;
margin-top:10px;
">
🚀 Publier l'annonce
</button>

<button
onclick="document.getElementById('modal').style.display='none'"
style="
width:100%;
padding:12px;
border:none;
border-radius:20px;
margin-top:10px;
background:#333;
color:white;
cursor:pointer;
">
Fermer
</button>

</div>
`;

document.getElementById("modal").style.display = "flex";

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
const file = e.target.files[0];
if(file) loadImage(file);
};

dropZone.addEventListener("dragover", e=>{
e.preventDefault();
dropZone.style.background="rgba(0,255,153,.2)";
});

dropZone.addEventListener("dragleave", ()=>{
dropZone.style.background="rgba(0,255,153,.08)";
});

dropZone.addEventListener("drop", e=>{
e.preventDefault();
dropZone.style.background="rgba(0,255,153,.08)";

const file = e.dataTransfer.files[0];
if(file) loadImage(file);
});

window.selectedImage = "";
window.selectedVideos = [];

const videoInput = document.getElementById("videoInput");
const videoZone = document.getElementById("videoZone");

videoZone.onclick = ()=>videoInput.click();

videoInput.onchange = e=>{

    const files = [...e.target.files];

    if(files.length > 3){
        alert("Maximum 3 vidéos");
        return;
    }

    window.selectedVideos = [];

    let html = "";

    files.forEach(file=>{

        const reader = new FileReader();

        reader.onload = ev=>{

            window.selectedVideos.push(ev.target.result);

            html += `
            <video
            src="${ev.target.result}"
            controls
            style="
            width:100%;
            margin-top:10px;
            border-radius:20px;
            ">
            </video>
            `;

            document.getElementById("videoPreview").innerHTML = html;

        };

        reader.readAsDataURL(file);

    });

};
}

function loadImage(file){

const reader = new FileReader();

reader.onload = function(e){

window.selectedImage = e.target.result;

const preview = document.getElementById("preview");

preview.src = e.target.result;
preview.style.display = "block";
};

reader.readAsDataURL(file);
}
async function create(){

    const name = document.getElementById("name").value.trim();
    const desc = document.getElementById("desc").value.trim();
    const price = Number(document.getElementById("price").value);

    if(!name || !price){
        alert("Nom et prix obligatoires !");
        return;
    }

    // Récupérer l'avatar du user (facultatif)
    let { data: userData, error: userError } = await client
        .from("users")
        .select("avatar")
        .eq("username", user)
        .single();

    if(userError){
        console.log(userError);
    }

    // Insertion du post
    let { error: postError } = await client
        .from("posts")
        .insert([{
            name: name,
            image: window.selectedImage || "",
            videos: window.selectedVideos || [],
            price: price,
            desc: desc,
            user_id: user,
            likes: 0
        }]);

    if(postError){
        console.log(postError);
        alert(postError.message);
        return;
    }

    alert("Annonce publiée ! 🚀");

    document.getElementById("modal").style.display = "none";

    document.getElementById("name").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("price").value = "";

    window.selectedImage = "";
    window.selectedVideos = [];

    loadPosts();
}

async function openInv(){

    let { data, error } = await client
        .from("inventaire")
        .select("*")
        .eq("user_id", user);

    let items = data || [];

    document.getElementById("box").innerHTML = `
        <h2>📦 Inventaire</h2>

        ${items.length === 0 ? "<p>Aucun objet 😢</p>" : ""}

        ${items.map(i => `
            <div style="
                background:#222;
                padding:10px;
                margin:10px 0;
                border-radius:15px;
                display:flex;
                align-items:center;
                gap:10px;
            ">
                <img src="${i.image}" style="width:40px;height:40px;border-radius:10px;">
                <div>
                    <b>${i.item}</b><br>
                    💰 ${i.price}
                </div>
            </div>
        `).join("")}

        <button onclick="document.getElementById('modal').style.display='none'"
        style="width:100%;padding:10px;margin-top:10px;">
            Fermer
        </button>
    `;

    document.getElementById("modal").style.display = "flex";
}
    
loadPosts();
loadProfile();
</script>

</body>
</html>
