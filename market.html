<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Social Market CLEAN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:50%;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

/* COMMENTS */
.commentBox{
    margin-top:10px;
    max-height:180px;
    overflow-y:auto;
    text-align:left;
}

.commentItem{
    background:#222;
    padding:6px;
    margin:5px 0;
    border-radius:8px;
}

/* INPUT */
input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <input id="search" placeholder="🔎 rechercher..." oninput="render()">
    <button onclick="openProfile()">👤</button>
    <button onclick="openNotif()">🔔</button>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- SELL -->
<button onclick="openSell()" style="position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#00ff99;border:none;font-size:30px;">+</button>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
let commentsCache = [];

let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* LOAD POSTS */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

/* COMMENTS */
async function loadComments(id){
    let { data } = await client.from("comments").select("*").eq("post_id",id);
    commentsCache[id] = data || [];
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts
    .filter(p => (p.name||"").toLowerCase().includes(search))
    .forEach(post => {

        let div = document.createElement("div");
        div.className="post";

        div.innerHTML = `
        <div class="card">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>💰 ${post.price}</p>
            <p>👤 ${post.user}</p>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="like(${post.id},${post.likes||0},'${post.user}')">❤️</button>
            <button class="commentBtn" onclick="comment(${post.id},'${post.user}')">💬</button>
            <button class="buyBtn" onclick="buy(${post.id},'${post.user}')">🛒</button>
        </div>
        `;

        feed.appendChild(div);
        loadComments(post.id);
    });
}

/* NOTIF */
async function notify(to,text,type){
    await client.from("notifications").insert([{user:to,text,type}]);
}

/* LIKE */
async function like(id,likes,owner){
    await client.from("posts").update({likes:(likes||0)+1}).eq("id",id);
    await notify(owner,"❤️ like sur ton annonce","like");
    loadPosts();
}

/* COMMENT */
async function comment(id,owner){

    let text = prompt("Commentaire:");
    if(!text) return;

    await client.from("comments").insert([{post_id:id,text,user}]);
    await notify(owner,"💬 nouveau commentaire","comment");

    loadPosts();
}

/* BUY */
async function buy(id,owner){

    let {data} = await client.from("posts").select("*").eq("id",id).single();

    let money = parseInt(localStorage.getItem("argent")||0);

    if(money < data.price){
        alert("Pas assez d'argent");
        return;
    }

    money -= data.price;
    localStorage.setItem("argent",money);

    await notify(owner,"🛒 achat de ton annonce","buy");

    alert("Acheté !");
}

/* PROFILE */
function openProfile(){

    document.getElementById("box").innerHTML = `
        <h2>Profil</h2>
        <input id="username" placeholder="pseudo">
        <input id="bio" placeholder="bio">
        <button onclick="saveProfile()">Save</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function saveProfile(){

    await client.from("profiles").upsert([{
        user,
        username:document.getElementById("username").value,
        bio:document.getElementById("bio").value
    }]);

    closeModal();
}

/* NOTIFS */
async function openNotif(){

    let {data} = await client.from("notifications").select("*").eq("user",user);

    document.getElementById("box").innerHTML = `
        <h2>Notifications</h2>
        ${(data||[]).map(n=>`<div class="commentItem">${n.text}</div>`).join("")}
    `;

    document.getElementById("modal").style.display="flex";
}

function openSell(){

    document.getElementById("box").innerHTML = `
        <h2>Vendre</h2>
        <input id="name" placeholder="nom">
        <textarea id="desc" placeholder="desc"></textarea>
        <input id="price" type="number">
        <input id="image" type="file">
        <button onclick="sell()">Publier</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function sell(){

    let file = document.getElementById("image").files[0];
    let reader = new FileReader();

    reader.onload = async function(e){

        await client.from("posts").insert([{
            name:document.getElementById("name").value,
            desc:document.getElementById("desc").value,
            price:parseInt(document.getElementById("price").value),
            image:e.target.result,
            likes:0,
            user
        }]);

        closeModal();
        loadPosts();
    };

    reader.readAsDataURL(file);
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

loadPosts();
</script>

</body>
</html>
