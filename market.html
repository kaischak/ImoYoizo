<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marché Supabase</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 5px;
}

.card {
    border: 1px solid #ccc;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
}

.card img {
    max-width: 200px;
}
</style>
</head>

<body>

<h1>🏪 Marché en ligne</h1>

<input id="name" placeholder="Nom"><br>
<textarea id="desc" placeholder="Description"></textarea><br>
<input id="price" type="number" placeholder="Prix"><br>
<input id="image" type="file"><br><br>

<button onclick="sell()">Vendre</button>

<hr>

<div id="list"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* 🔥 CONFIG SUPABASE */
const supabaseUrl = "https://wuxhvpiaenmhipjfrojj.supabase.co";
const supabaseKey = "TA_ANON_KEY_ICI";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* 📦 CHARGER PRODUITS */
async function loadProducts(){

    let { data, error } = await supabase
        .from("market")
        .select("*")
        .order("created_at", { ascending: false });

    if(error){
        console.log(error);
        return;
    }

    render(data);
}

/* 🎨 AFFICHAGE */
function render(items){

    let list = document.getElementById("list");
    list.innerHTML = "";

    items.forEach(item => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${item.name}</h3>
            <img src="${item.image}">
            <p>${item.description}</p>
            <p>💰 ${item.price}</p>
        `;

        list.appendChild(div);
    });
}

/* ➕ AJOUT PRODUIT */
function sell(){

    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = parseInt(document.getElementById("price").value);
    let imageFile = document.getElementById("image").files[0];

    if(!name || !price || !imageFile){
        alert("Remplis tous les champs !");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){

        let { error } = await supabase
            .from("market")
            .insert([{
                name: name,
                description: desc,
                price: price,
                image: e.target.result
            }]);

        if(error){
            console.log(error);
            return;
        }

        loadProducts();
    };

    reader.readAsDataURL(imageFile);
}

/* 🚀 INIT */
loadProducts();

/* 🔄 refresh auto (optionnel) */
setInterval(loadProducts, 5000);

</script>

</body>
</html>
