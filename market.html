<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Market</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#addBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#00ff99;
    font-size:20px;
    cursor:pointer;
}

/* FEED */
#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    padding-top:60px;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

/* ACTIONS */
.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}

/* MODAL GLOBAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

/* COMMENTS UI */
.commentList{
    max-height:60vh;
    overflow-y:auto;
    margin-top:10px;
}

.commentItem{
    background:#222;
    padding:8px;
    border-radius:10px;
    margin:5px 0;
}

.commentInputBar{
    display:flex;
    gap:5px;
    margin-top:10px;
}

.commentInputBar input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

.commentInputBar button{
    width:80px;
    border:none;
    border-radius:10px;
    background:#2d6bff;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <input id="search" placeholder="🔎 rechercher..." oninput="render()">
    <button id="addBtn" onclick="openCreatePost()">➕</button>
</div>

<div id="feed"></div>

<!-- MODAL GLOBAL -->
<div id="modal" class="modal">
    <div class="box" id="box"></div>
</div>

<!-- COMMENT MODAL -->
<div id="commentModal" class="modal">
    <div class="box" id="commentBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "YOUR_SUPABASE_KEY";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];
let commentsCache = {};
let currentPostId = null;

let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* LOAD POSTS */
async function loadPosts(){
    let { data } = await client.from("posts").select("*");
    posts = data || [];
    render();
}

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts
    .filter(p => (p.name||"").toLowerCase().includes(search))
    .forEach(post => {

        let div = document.createElement("div");
        div.className="post";

        div.innerHTML = `
        <div class="card">
            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>💰 ${post.price}</p>
        </div>

        <div class="actions">
            <button class="likeBtn" onclick="like(${post.id},${post.likes||0})">❤️</button>
            <button class="commentBtn" onclick="openComments(${post.id})">💬</button>
            <button class="buyBtn" onclick="buy(${post.id})">🛒</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* CREATE POST */
function openCreatePost(){

    document.getElementById("box").innerHTML = `
        <h2>Créer un post</h2>
        <input id="name" placeholder="Nom">
        <input id="image" placeholder="Image URL">
        <input id="price" placeholder="Prix">
        <button onclick="createPost()">Publier</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function createPost(){

    await client.from("posts").insert([{
        name: document.getElementById("name").value,
        image: document.getElementById("image").value,
        price: parseFloat(document.getElementById("price").value),
        user,
        likes:0
    }]);

    closeModal();
    loadPosts();
}

/* LIKE */
async function like(id,likes){

    await client.from("posts")
        .update({likes:(likes||0)+1})
        .eq("id",id);

    loadPosts();
}

/* BUY */
async function buy(id){

    let {data} = await client.from("posts")
        .select("*")
        .eq("id",id)
        .single();

    let money = parseInt(localStorage.getItem("money")||0);

    if(money < data.price){
        alert("pas assez d'argent");
        return;
    }

    localStorage.setItem("money", money - data.price);

    alert("acheté !");
}

/* COMMENTS SYSTEM */
async function openComments(postId){

    currentPostId = postId;

    await loadComments(postId);
    renderComments(postId);

    document.getElementById("commentModal").style.display="flex";
}

async function loadComments(postId){

    let { data } = await client
        .from("comments")
        .select("*")
        .eq("post_id", postId);

    commentsCache[postId] = data || [];
}

function renderComments(postId){

    let comments = commentsCache[postId] || [];

    document.getElementById("commentBox").innerHTML = `
        <h2>💬 Commentaires</h2>

        <div class="commentList">
            ${comments.map(c => `
                <div class="commentItem">
                    <b>${c.user}</b> : ${c.text}
                </div>
            `).join("")}
        </div>

        <div class="commentInputBar">
            <input id="commentText" placeholder="Écrire un commentaire...">
            <button onclick="sendComment()">Envoyer</button>
        </div>

        <button onclick="closeComments()">Fermer</button>
    `;
}

async function sendComment(){

    let text = document.getElementById("commentText").value;
    if(!text) return;

    await client.from("comments").insert([{
        post_id: currentPostId,
        text,
        user
    }]);

    document.getElementById("commentText").value = "";

    await loadComments(currentPostId);
    renderComments(currentPostId);
}

function closeComments(){
    document.getElementById("commentModal").style.display="none";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

loadPosts();
</script>

</body>
</html>
