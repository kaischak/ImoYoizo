<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marché Supabase Clean</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 5px;
}

.card {
    border: 1px solid #ccc;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
}

.card img {
    max-width: 200px;
}
</style>
</head>

<body>

<h1>🏪 Marché en ligne</h1>

<input id="name" placeholder="Nom"><br>
<textarea id="desc" placeholder="Description"></textarea><br>
<input id="price" type="number" placeholder="Prix"><br>
<input id="image" type="file"><br><br>

<button onclick="sell()">Vendre</button>

<hr>

<div id="list"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================
   🔥 SUPABASE (1 SEUL)
========================= */
const supabaseUrl = "https://wuxhvpiaenmhipjfrojj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1eGh2cGlhZW5taGlwamZyb2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTI0OTMsImV4cCI6MjA5NjMyODQ5M30.N-gARZEGnpy0gobbx34DL-1t-IklcbtTmUnvhYm1rUE";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   📦 CHARGER PRODUITS
========================= */
async function loadProducts(){

    const { data, error } = await supabase
        .from("market")
        .select("*")
        .order("created_at", { ascending: false });

    if(error){
        console.log("Erreur load:", error);
        return;
    }

    render(data);
}

/* =========================
   🎨 AFFICHAGE
========================= */
function render(items){

    const list = document.getElementById("list");
    list.innerHTML = "";

    if(!items || items.length === 0){
        list.innerHTML = "<p>Aucun produit</p>";
        return;
    }

    items.forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${item.name}</h3>
            <img src="${item.image}">
            <p>${item.description}</p>
            <p>💰 ${item.price}</p>
        `;

        list.appendChild(div);
    });
}

/* =========================
   ➕ AJOUT PRODUIT
========================= */
function sell(){

    const name = document.getElementById("name").value;
    const desc = document.getElementById("desc").value;
    const price = parseInt(document.getElementById("price").value);
    const imageFile = document.getElementById("image").files[0];

    if(!name || !price || !imageFile){
        alert("Remplis tous les champs !");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function(e){

        const { error } = await supabase
            .from("market")
            .insert([{
                name: name,
                description: desc,
                price: price,
                image: e.target.result
            }]);

        if(error){
            console.log("Erreur insert:", error);
            return;
        }

        document.getElementById("name").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";

        loadProducts();
    };

    reader.readAsDataURL(imageFile);
}

/* =========================
   🚀 INIT
========================= */
loadProducts();

</script>

</body>
</html>
