<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Market FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

.topbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:10;
}

#search{
    width:50%;
    padding:10px;
    border-radius:10px;
    border:none;
}

#miniProfile{
    position:absolute;
    left:10px;
    font-size:12px;
    cursor:pointer;
}

#miniProfile strong{
    display:block;
}

#feed{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.post{
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.card{
    width:90%;
    max-width:450px;
    background:#16161d;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:15px;
}

.actions{
    position:absolute;
    right:15px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.actions button{
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
}

.likeBtn{background:#ff2d55;color:white;}
.commentBtn{background:#2d6bff;color:white;}
.buyBtn{background:#00ff99;}
.followBtn{background:#ffcc00;color:black;padding:8px;border-radius:10px;margin-top:5px;}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:90%;
    max-width:500px;
    background:#16161d;
    padding:20px;
    border-radius:20px;
}

input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="topbar">

    <div id="miniProfile" onclick="openProfile()">
        <strong id="pname">👤 loading...</strong>
        <span id="pbio">...</span>
        <div id="pfollowers">0 followers</div>
    </div>

    <input id="search" placeholder="🔎 rechercher..." oninput="render()">
    <button onclick="openNotif()">🔔</button>
</div>

<div id="feed"></div>

<div id="modal" class="modal">
    <div class="box" id="box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let posts = [];

let user = localStorage.getItem("user") || ("user"+Math.floor(Math.random()*9999));
localStorage.setItem("user", user);

/* ================= PROFILE ================= */

async function loadProfile(){

    let { data } = await client
        .from("profiles")
        .select("*")
        .eq("user_id", user)
        .single();

    if(!data){

        await client.from("profiles").insert([{
            user_id: user,
            username: user,
            bio: "nouvel utilisateur"
        }]);

        return loadProfile();
    }

    document.getElementById("pname").textContent = "👤 " + data.username;
    document.getElementById("pbio").textContent = data.bio || "";

    loadFollowers();
}

/* ================= FOLLOWERS ================= */

async function loadFollowers(){

    let { data } = await client
        .from("followers")
        .select("*")
        .eq("following", user);

    document.getElementById("pfollowers").textContent =
        (data?.length || 0) + " followers";
}

/* ================= POSTS ================= */

async function loadPosts(){

    let { data } = await client
        .from("posts")
        .select("*");

    posts = data || [];
    render();
}

/* ================= RENDER ================= */

function render(){

    let search = document.getElementById("search").value.toLowerCase();
    let feed = document.getElementById("feed");

    feed.innerHTML = "";

    posts
    .filter(p => (p.name||"").toLowerCase().includes(search))
    .forEach(post => {

        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
        <div class="card">

            <h2>${post.name}</h2>
            <img src="${post.image}">
            <p>💰 ${post.price}</p>
            <p>👤 ${post.user_id}</p>

            <button class="followBtn" onclick="follow('${post.user_id}')">
                ➕ Follow
            </button>

        </div>

        <div class="actions">
            <button class="likeBtn" onclick="like(${post.id},${post.likes||0},'${post.user_id}')">❤️</button>
            <button class="commentBtn" onclick="comment(${post.id},'${post.user_id}')">💬</button>
            <button class="buyBtn" onclick="buy(${post.id},'${post.user_id}')">🛒</button>
        </div>
        `;

        feed.appendChild(div);
    });
}

/* ================= FOLLOW ================= */

async function follow(target){

    if(target === user) return;

    await client.from("followers").insert([{
        follower:user,
        following:target
    }]);

    await client.from("notifications").insert([{
        user:target,
        text:"➕ nouveau follower"
    }]);

    loadFollowers();
}

/* ================= LIKE ================= */

async function like(id,likes,owner){

    await client.from("posts")
        .update({likes:(likes||0)+1})
        .eq("id",id);

    await client.from("notifications").insert([{
        user:owner,
        text:"❤️ like"
    }]);

    loadPosts();
}

/* ================= COMMENT ================= */

async function comment(id,owner){

    let text = prompt("commentaire");
    if(!text) return;

    await client.from("comments").insert([{
        post_id:id,
        text,
        user_id:user
    }]);

    await client.from("notifications").insert([{
        user:owner,
        text:"💬 commentaire"
    }]);
}

/* ================= BUY ================= */

async function buy(id,owner){

    let {data} = await client
        .from("posts")
        .select("*")
        .eq("id",id)
        .single();

    let money = parseInt(localStorage.getItem("argent")||0);

    if(money < data.price){
        alert("pas assez d'argent");
        return;
    }

    money -= data.price;
    localStorage.setItem("argent",money);

    await client.from("notifications").insert([{
        user:owner,
        text:"🛒 achat"
    }]);

    alert("acheté !");
}

/* ================= PROFILE MODAL ================= */

function openProfile(){

    document.getElementById("box").innerHTML = `
        <h2>Profil</h2>
        <input id="username" placeholder="pseudo">
        <input id="bio" placeholder="bio">
        <button onclick="saveProfile()">save</button>
    `;

    document.getElementById("modal").style.display="flex";
}

async function saveProfile(){

    await client.from("profiles").upsert([{
        user_id:user,
        username:document.getElementById("username").value,
        bio:document.getElementById("bio").value
    }]);

    document.getElementById("modal").style.display="none";
    loadProfile();
}

/* ================= NOTIFS ================= */

async function openNotif(){

    let {data} = await client
        .from("notifications")
        .select("*")
        .eq("user",user);

    document.getElementById("box").innerHTML = `
        <h2>Notifications</h2>
        ${(data||[]).map(n=>`<div>${n.text}</div>`).join("")}
    `;

    document.getElementById("modal").style.display="flex";
}

/* ================= START ================= */

loadPosts();
loadProfile();
</script>

</body>
</html>
