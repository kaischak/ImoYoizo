<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marché</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 5px;
}

.card {
    border: 1px solid #ccc;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
}

.card img {
    max-width: 200px;
    max-height: 200px;
}
</style>
</head>

<body>

<h1>🏪 Marché en ligne</h1>

<h3>Créer une annonce</h3>

<input id="name" placeholder="Nom">
<br>

<textarea id="desc" placeholder="Description"></textarea>
<br>

<input id="price" type="number" placeholder="Prix">
<br>

<input id="image" type="file" accept="image/*">
<br><br>

<button onclick="sell()">Vendre</button>

<hr>

<div id="list"></div>

<!-- 🔥 SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eezsocswqhqgkvghhygq.supabase.co/rest/v1/market";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlenNvY3N3cWhxZ2t2Z2hoeWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjg5MjYsImV4cCI6MjA5NjY0NDkyNn0.TVI962lsUo67i6Ltq8okbOw-_GO-5yc4KDCyc8OkdVQ";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* 📦 CHARGER LE MARCHÉ */
async function getMarket(){
    let { data, error } = await client
        .from("market")
        .select("*");

    return data || [];
}

/* 🖥️ AFFICHAGE */
async function render(){

    let list = document.getElementById("list");
    list.innerHTML = "";

    let market = await getMarket();

    market.forEach((item) => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${item.name}</h3>
            <img src="${item.image}">
            <p>${item.desc}</p>
            <p>💰 ${item.price}</p>

            <button onclick="buy(${item.id})">
                Acheter
            </button>
        `;

        list.appendChild(div);
    });
}

/* 📤 VENDRE */
async function sell(){

    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = parseInt(document.getElementById("price").value);
    let imageFile = document.getElementById("image").files[0];

    if(!name || !price || !imageFile){
        alert("Remplis tous les champs !");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function(e){

        await client
            .from("market")
            .insert([{
                name: name,
                desc: desc,
                price: price,
                image: e.target.result
            }]);

        document.getElementById("name").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";

        render();
    };

    reader.readAsDataURL(imageFile);
}

/* 🛒 ACHETER */
async function buy(id){

    let { data, error } = await client
        .from("market")
        .select("*")
        .eq("id", id)
        .single();

    let money = parseInt(localStorage.getItem("argent") || 0);

    if(money < data.price){
        alert("Pas assez d'argent !");
        return;
    }

    money -= data.price;
    localStorage.setItem("argent", money);

    let inv = JSON.parse(localStorage.getItem("inventaire")) || [];
    inv.push(data.name);
    localStorage.setItem("inventaire", JSON.stringify(inv));

    await client
        .from("market")
        .delete()
        .eq("id", id);

    render();
}

render();
</script>

</body>
</html>
